      let upper = Math.min(length, 1.0);
      while (upper < length && rAtLocalOriented(params, upper, length, invertOrientation) < targetRadius) {
        lower = upper;
        upper = Math.min(length, upper * 2.0);
      }
      if (rAtLocalOriented(params, upper, length, invertOrientation) < targetRadius) {
        return length;
      }
      for (let i = 0; i < 24; i += 1) {
        const mid = 0.5 * (lower + upper);
        if (rAtLocalOriented(params, mid, length, invertOrientation) < targetRadius) {
          lower = mid;
        } else {
          upper = mid;
        }
      }
      return upper;
    }

    function profileSampleFractionsByDelta(params, length, samples, radiusAt) {
      const fineSteps = Math.max(samples * 12, 1024);
      const cumulative = [0.0];
      let totalWeight = 0.0;
      let previous = radiusAt(0.0);
      for (let i = 1; i <= fineSteps; i += 1) {
        const frac = i / fineSteps;
        const radius = radiusAt(length * frac);
        totalWeight += Math.max(Math.abs(radius - previous), 1e-6);
        cumulative.push(totalWeight);
        previous = radius;
      }
      if (totalWeight <= 0.0) {
        return Array.from({ length: samples + 1 }, (_, i) => i / samples);
      }
      const fractions = [0.0];
      let idx = 1;
      for (let i = 1; i < samples; i += 1) {
        const target = totalWeight * i / samples;
        while (idx < cumulative.length - 1 && cumulative[idx] < target) {
          idx += 1;
        }
        const lowWeight = cumulative[idx - 1];
        const highWeight = cumulative[idx];
        const span = Math.max(highWeight - lowWeight, 1e-9);
        const localT = (target - lowWeight) / span;
        fractions.push(Math.max(0.0, Math.min(1.0, ((idx - 1) + localT) / fineSteps)));
      }
      fractions.push(1.0);
      return fractions;
    }

    function makeCircleWire(oc, radius, z, segments = CIRCLE_SEGMENTS) {
      const r = Math.max(0.05, radius);
      const polygon = instantiateAvailable(oc, ["BRepBuilderAPI_MakePolygon_1"], []);
      for (let i = 0; i < segments; i += 1) {
        const angle = (i / segments) * Math.PI * 2.0;
        const point = new oc.gp_Pnt_3(r * Math.cos(angle), r * Math.sin(angle), z);
        callFirstAvailable(polygon, ["Add_1", "Add"], [point]);
      }
      callFirstAvailable(polygon, ["Close"], []);
      return callFirstAvailable(polygon, ["Wire"], []);
    }

    function buildSectionLoft(oc, sections) {
      const tool = new oc.BRepOffsetAPI_ThruSections(true, false, 1.0e-3);
      for (const section of sections) {
        tool.AddWire(makeCircleWire(oc, section.radius, section.z));
      }
      tool.CheckCompatibility(false);
      return tool.Shape();
    }

    function linearSampleFractions(samples) {
      return Array.from({ length: samples + 1 }, (_, i) => i / samples);
    }

    function buildLatheSections(params, length, bodyZ0, offset = 0.0, samples = LOFT_SECTION_COUNT) {
      const fractions = linearSampleFractions(samples);
      return fractions.map((fraction) => {
        const zLocal = length * fraction;
        const baseRadius = offset > 0.0
          ? Math.max(0.05, rInnerLocal(params, zLocal, length))
          : Math.max(0.05, rAtLocal(params, zLocal, length));
        return { z: bodyZ0 + zLocal, radius: baseRadius };
      });
    }

    function buildOuterProfilePolyline(params, length, bodyZ0, samples = PROFILE_SAMPLES) {
      const fractions = linearSampleFractions(samples);
      return fractions.map((fraction) => {
        const zLocal = length * fraction;
        return {
          x: Math.max(0.0, rAtLocal(params, zLocal, length)),
          z: bodyZ0 + zLocal
        };
      });
    }

    function buildInnerOffsetPolyline(params, outerPoints, bodyZ0, length) {
      const minRadius = 0.05;
      const minZ = bodyZ0 + Math.max(params.wallThickness * 0.25, 0.05);
      const maxZ = bodyZ0 + length - Math.max(params.wallThickness * 0.25, 0.05);
      const rawInner = [];

      for (let i = 0; i < outerPoints.length; i += 1) {
        const prev = outerPoints[Math.max(i - 1, 0)];
        const next = outerPoints[Math.min(i + 1, outerPoints.length - 1)];
        const dx = next.x - prev.x;
        const dz = next.z - prev.z;
        const tangentLength = Math.hypot(dx, dz);
        if (tangentLength <= 1.0e-9) {
          continue;
        }

        const inwardNormalX = -dz / tangentLength;
        const inwardNormalZ = dx / tangentLength;
        const outer = outerPoints[i];
        let innerX = outer.x + inwardNormalX * params.wallThickness;
        let innerZ = outer.z + inwardNormalZ * params.wallThickness;

        innerX = Math.min(innerX, outer.x - 0.01);
        if (innerX <= minRadius || innerZ <= minZ || innerZ >= maxZ) {
          continue;
        }
        rawInner.push({ x: innerX, z: innerZ });
      }

      const inner = [];
      let lastZ = -Infinity;
      for (const point of rawInner) {
        if (point.z <= lastZ + 1.0e-3) {
          continue;
        }
        inner.push(point);
        lastZ = point.z;
      }

      if (inner.length < 2) {
        throw new Error("Shell thickness is too large for this profile.");
      }
      return inner;
    }

    function interpolatePointAtX(a, b, targetX) {
      const dx = b.x - a.x;
      if (Math.abs(dx) <= 1.0e-9) {
        return { x: targetX, z: a.z };
      }
      const t = Math.max(0.0, Math.min(1.0, (targetX - a.x) / dx));
      return {
        x: targetX,
        z: a.z + (b.z - a.z) * t
      };
    }

    function trimProfileToVerticals(points, topTargetX, bottomTargetX) {
      if (!points || points.length < 2) {
        return points ? points.slice() : [];
      }

      let startPoint = points[0];
      let startIndex = 0;
      for (let i = 1; i < points.length; i += 1) {
        const prev = points[i - 1];
        const curr = points[i];
        if (curr.x >= topTargetX) {
          startPoint = prev.x >= topTargetX ? prev : interpolatePointAtX(prev, curr, topTargetX);
          startIndex = i;
          break;
        }
      }

      let endPoint = points[points.length - 1];
      let endIndex = points.length - 1;
      for (let i = points.length - 1; i > 0; i -= 1) {
        const prev = points[i - 1];
        const curr = points[i];
        if (prev.x >= bottomTargetX) {
          endPoint = curr.x >= bottomTargetX ? curr : interpolatePointAtX(prev, curr, bottomTargetX);
          endIndex = i - 1;
          break;
        }
      }

      const trimmed = [];
      pushUniqueProfilePoint(trimmed, startPoint);
      for (let i = startIndex; i <= endIndex; i += 1) {
        pushUniqueProfilePoint(trimmed, points[i]);
      }
      pushUniqueProfilePoint(trimmed, endPoint);
      return trimmed;
    }

    function findProfilePointAtX(points, targetX, fromStart = true) {
      if (!points || points.length < 2) {
        return points && points.length ? { x: targetX, z: points[0].z } : { x: targetX, z: 0.0 };
      }

      if (fromStart) {
        for (let i = 1; i < points.length; i += 1) {
          const prev = points[i - 1];
          const curr = points[i];
          if (curr.x >= targetX) {
            return prev.x >= targetX ? { x: prev.x, z: prev.z } : interpolatePointAtX(prev, curr, targetX);
          }
        }
        const last = points[points.length - 1];
        return { x: Math.max(targetX, last.x), z: last.z };
      }

      for (let i = points.length - 1; i > 0; i -= 1) {
        const prev = points[i - 1];
        const curr = points[i];
        if (prev.x >= targetX) {
          return curr.x >= targetX ? { x: curr.x, z: curr.z } : interpolatePointAtX(prev, curr, targetX);
        }
      }

      const first = points[0];
      return { x: Math.max(targetX, first.x), z: first.z };
    }

    function sliceProfileByZ(points, startPoint, endPoint, tolerance = 1.0e-6) {
      const sliced = [];
      pushUniqueProfilePoint(sliced, startPoint, tolerance);
      for (const point of points) {
        if (point.z > startPoint.z + tolerance && point.z < endPoint.z - tolerance) {
          pushUniqueProfilePoint(sliced, point, tolerance);
        }
      }
      pushUniqueProfilePoint(sliced, endPoint, tolerance);
      return sliced;
    }

    function normalizeAnglePositive(angle) {
      let normalized = angle % (2.0 * Math.PI);
      if (normalized < 0.0) {
        normalized += 2.0 * Math.PI;
      }
      return normalized;
    }

    function solveWallFilletOnPolyline(points, wallX, requestedRadius, isTopFillet) {
      if (!points || points.length < 2 || requestedRadius <= 1.0e-6) {
        return null;
      }

      const maxAttempts = 18;
      for (let attempt = 0; attempt <= maxAttempts; attempt += 1) {
        const radius = requestedRadius * (1.0 - attempt / maxAttempts);
        if (radius <= 1.0e-6) {
          break;
        }

        const centerX = wallX + radius;
        const indices = isTopFillet
          ? Array.from({ length: points.length - 1 }, (_, i) => i)
          : Array.from({ length: points.length - 1 }, (_, i) => points.length - 2 - i);

        for (const i of indices) {
          const a = points[i];
          const b = points[i + 1];
          const dx = b.x - a.x;
          const dz = b.z - a.z;
          const segLength = Math.hypot(dx, dz);
          if (segLength <= 1.0e-9 || Math.abs(dx) <= 1.0e-9) {
            continue;
          }

          const normalX = -dz / segLength;
          const normalZ = dx / segLength;
          if (normalX >= -1.0e-6) {
            continue;
          }

          let t = (centerX - (a.x + normalX * radius)) / dx;
          if (t < -1.0e-6 || t > 1.0 + 1.0e-6) {
            continue;
          }
          t = Math.max(0.0, Math.min(1.0, t));

          const tangent = {
            x: a.x + dx * t,
            z: a.z + dz * t
          };
          const center = {
            x: centerX,
            z: tangent.z + normalZ * radius
          };
          const wall = {
            x: wallX,
            z: center.z
          };

          if (isTopFillet && center.z <= tangent.z + 1.0e-6) {
            continue;
          }
          if (!isTopFillet && center.z >= tangent.z - 1.0e-6) {
            continue;
          }

          const tangentAngle = normalizeAnglePositive(Math.atan2(tangent.z - center.z, tangent.x - center.x));
          if (isTopFillet) {
            // Bottom/base fillet: allow any tangent on the lower half of the circle.
            if (tangentAngle < Math.PI - 1.0e-6) {
              continue;
            }
          } else {
            // Top/tail fillet: allow any tangent on the upper half of the circle.
            if (tangentAngle > Math.PI + 1.0e-6) {
              continue;
            }
          }

          return {
            radius,
            tangent,
            center,
            wall,
            tangentAngle
          };
        }
      }

      return null;
    }

    function makeShelfCornerFillet(wallX, shelfPoint, requestedRadius, isBottomFillet) {
      const horizontalGap = shelfPoint.x - wallX;
      const radius = Math.max(0.0, Math.min(requestedRadius, horizontalGap));
      if (radius <= 1.0e-6) {
        return null;
      }

      if (isBottomFillet) {
        return {
          radius,
          tangent: {
            x: wallX + radius,
            z: shelfPoint.z
          },
          center: {
            x: wallX + radius,
            z: shelfPoint.z + radius
          },
          wall: {
            x: wallX,
            z: shelfPoint.z + radius
          },
          tangentAngle: 1.5 * Math.PI
        };
      }

      return {
        radius,
        tangent: {
          x: wallX + radius,
          z: shelfPoint.z
        },
        center: {
          x: wallX + radius,
          z: shelfPoint.z - radius
        },
        wall: {
          x: wallX,
          z: shelfPoint.z - radius
        },
        tangentAngle: 0.5 * Math.PI
      };
    }

    function makeProfileWire(oc, points) {
      const polygon = instantiateAvailable(oc, ["BRepBuilderAPI_MakePolygon_1", "BRepBuilderAPI_MakePolygon"], []);
      for (const point of points) {
        callFirstAvailable(polygon, ["Add_1", "Add"], [new oc.gp_Pnt_3(point.x, 0, point.z)]);
      }
      callFirstAvailable(polygon, ["Close"], []);
      return callFirstAvailable(polygon, ["Wire"], []);
    }

    function makeWireFrom3dPoints(oc, points, close = true) {
      const polygon = instantiateAvailable(oc, ["BRepBuilderAPI_MakePolygon_1", "BRepBuilderAPI_MakePolygon"], []);
      for (const point of points) {
        callFirstAvailable(polygon, ["Add_1", "Add"], [new oc.gp_Pnt_3(point[0], point[1], point[2])]);
      }
      if (close) {
        callFirstAvailable(polygon, ["Close"], []);
      }
      return callFirstAvailable(polygon, ["Wire"], []);
    }

    function makeFaceFromWire(oc, wire) {
      return shapeOf(
        instantiateAvailableVariants(oc, [
          {
            names: [
              "BRepBuilderAPI_MakeFace_16",
              "BRepBuilderAPI_MakeFace_15",
              "BRepBuilderAPI_MakeFace_8",
              "BRepBuilderAPI_MakeFace_6",
              "BRepBuilderAPI_MakeFace_1",
              "BRepBuilderAPI_MakeFace"
            ],
            args: [wire, true]
          },
          {
            names: [
              "BRepBuilderAPI_MakeFace_16",
              "BRepBuilderAPI_MakeFace_15",
              "BRepBuilderAPI_MakeFace_8",
              "BRepBuilderAPI_MakeFace_6",
              "BRepBuilderAPI_MakeFace_1",
              "BRepBuilderAPI_MakeFace"
            ],
            args: [wire]
          }
        ])
      );
    }

    function makeFaceFromWires(oc, outerWire, innerWires = []) {
      const maker = instantiateAvailableVariants(oc, [
        {
          names: [
            "BRepBuilderAPI_MakeFace_16",
            "BRepBuilderAPI_MakeFace_15",
            "BRepBuilderAPI_MakeFace_8",
            "BRepBuilderAPI_MakeFace_6",
            "BRepBuilderAPI_MakeFace_1",
            "BRepBuilderAPI_MakeFace"
          ],
          args: [outerWire, true]
        },
        {
          names: [
            "BRepBuilderAPI_MakeFace_16",
            "BRepBuilderAPI_MakeFace_15",
            "BRepBuilderAPI_MakeFace_8",
            "BRepBuilderAPI_MakeFace_6",
            "BRepBuilderAPI_MakeFace_1",
            "BRepBuilderAPI_MakeFace"
          ],
          args: [outerWire]
        }
      ]);
      for (const innerWire of innerWires) {
        callFirstAvailable(maker, ["Add_1", "Add"], [innerWire]);
      }
      return shapeOf(callFirstAvailable(maker, ["Face", "Shape"], []));
    }

    function makeRevolveProfileFace(oc, profilePoints) {
      if (!profilePoints || profilePoints.length < 2) {
        throw new Error("At least two profile points are required for revolve.");
      }
      const start = profilePoints[0];
      const end = profilePoints[profilePoints.length - 1];
      const closedProfile = [{ x: 0.0, z: start.z }, ...profilePoints, { x: 0.0, z: end.z }];
      const wire = makeProfileWire(oc, closedProfile);
      return makeFaceFromWire(oc, wire);
    }

    function revolveShape(oc, shape) {
      const axisPoint = new oc.gp_Pnt_3(0, 0, 0);
      const axisDir = instantiateAvailable(oc, ["gp_Dir_4", "gp_Dir_2", "gp_Dir"], [0, 0, 1]);
      const axis = instantiateAvailableVariants(oc, [
        { names: ["gp_Ax1_3", "gp_Ax1_2", "gp_Ax1"], args: [axisPoint, axisDir] }
      ]);
      return shapeOf(
        instantiateAvailableVariants(oc, [
          { names: ["BRepPrimAPI_MakeRevol_1", "BRepPrimAPI_MakeRevol"], args: [shape, axis] },
          { names: ["BRepPrimAPI_MakeRevol_2", "BRepPrimAPI_MakeRevol"], args: [shape, axis, 2.0 * Math.PI] },
          { names: ["BRepPrimAPI_MakeRevol_3", "BRepPrimAPI_MakeRevol"], args: [shape, axis, 2.0 * Math.PI, false] }
        ])
      );
    }

    function pushUniqueProfilePoint(points, point, tolerance = 1.0e-3) {
      const previous = points[points.length - 1];
      if (
        previous
        && Math.abs(previous.x - point.x) <= tolerance
        && Math.abs(previous.z - point.z) <= tolerance
      ) {
        return;
      }
      points.push(point);
    }

    function buildInternalCavityProfilePoints(params, length, bodyZ0, postOuterRadius) {
      const outerProfile = buildOuterProfilePolyline(params, length, bodyZ0, PROFILE_SAMPLES);
      const rawInnerProfile = buildInnerOffsetPolyline(params, outerProfile, bodyZ0, length);
      if (rawInnerProfile.length < 2) {
        throw new Error("Inner cavity profile is too short.");
      }

      const rawStart = rawInnerProfile[0];
      const rawEnd = rawInnerProfile[rawInnerProfile.length - 1];
      const verticalSpan = Math.max(0.2, Math.abs(rawEnd.z - rawStart.z));
      const maxInnerX = rawInnerProfile.reduce((maxValue, point) => Math.max(maxValue, point.x), 0.0);
      const maxHorizontalGap = Math.max(0.0, maxInnerX - postOuterRadius);
      let baseRadius = Math.abs(params.postBaseFilletRadius || 0.0);
      let tailRadius = Math.abs(params.postTailFilletRadius || 0.0);
      baseRadius = Math.min(
        baseRadius,
        verticalSpan * 0.45
      );
      tailRadius = Math.min(
        tailRadius,
        Math.max(0.0, verticalSpan - baseRadius),
        verticalSpan * 0.45
      );
      baseRadius = Math.min(baseRadius, maxHorizontalGap);
      tailRadius = Math.min(tailRadius, maxHorizontalGap);
      const baseShelfPoint = findProfilePointAtX(
        rawInnerProfile,
        postOuterRadius + Math.max(baseRadius, 0.05),
        true
      );
      const tailShelfPoint = findProfilePointAtX(
        rawInnerProfile,
        postOuterRadius + Math.max(tailRadius, 0.05),
        false
      );
      const baseFillet = solveWallFilletOnPolyline(rawInnerProfile, postOuterRadius, baseRadius, true)
        || makeShelfCornerFillet(postOuterRadius, baseShelfPoint, baseRadius, true);
      const tailFillet = solveWallFilletOnPolyline(rawInnerProfile, postOuterRadius, tailRadius, false)
        || makeShelfCornerFillet(postOuterRadius, tailShelfPoint, tailRadius, false);
      baseRadius = baseFillet ? baseFillet.radius : 0.0;
      tailRadius = tailFillet ? tailFillet.radius : 0.0;

      const start = baseFillet
        ? baseFillet.tangent
        : findProfilePointAtX(rawInnerProfile, postOuterRadius, true);
      const end = tailFillet
        ? tailFillet.tangent
        : findProfilePointAtX(rawInnerProfile, postOuterRadius, false);
      const innerProfile = sliceProfileByZ(rawInnerProfile, start, end);

      const cavityProfile = [];
      const baseFilletPath = [];
      const tailFilletPath = [];
      if (baseFillet) {
        pushUniqueProfilePoint(cavityProfile, baseFillet.wall);
        pushUniqueProfilePoint(baseFilletPath, baseFillet.wall);
        for (const point of sampleArcPoints(
          baseFillet.center.x,
          baseFillet.center.z,
          baseFillet.radius,
          Math.PI,
          baseFillet.tangentAngle,
          16
        )) {
          pushUniqueProfilePoint(cavityProfile, point);
          pushUniqueProfilePoint(baseFilletPath, point);
        }
      } else {
        const baseWallPoint = {
          x: postOuterRadius,
          z: start.z
        };
        pushUniqueProfilePoint(cavityProfile, baseWallPoint);
        pushUniqueProfilePoint(baseFilletPath, baseWallPoint);
      }

      pushUniqueProfilePoint(cavityProfile, start);
      pushUniqueProfilePoint(baseFilletPath, start);
      for (let i = 1; i < innerProfile.length - 1; i += 1) {
        pushUniqueProfilePoint(cavityProfile, innerProfile[i]);
      }
      pushUniqueProfilePoint(cavityProfile, end);
      pushUniqueProfilePoint(tailFilletPath, end);

      if (tailFillet) {
        for (const point of sampleArcPoints(
          tailFillet.center.x,
          tailFillet.center.z,
          tailFillet.radius,
          tailFillet.tangentAngle,
          Math.PI,
          16
        )) {
          pushUniqueProfilePoint(cavityProfile, point);
          pushUniqueProfilePoint(tailFilletPath, point);
        }
      } else {
        const tailWallPoint = {
          x: postOuterRadius,
          z: end.z
        };
        pushUniqueProfilePoint(cavityProfile, tailWallPoint);
        pushUniqueProfilePoint(tailFilletPath, tailWallPoint);
      }

      return {
        points: cavityProfile,
        baseRadius,
        tailRadius,
        baseFilletPath,
        tailFilletPath
      };
    }

    function buildInternalCavityWithPostFilletsByRevolve(oc, params, length, bodyZ0, postOuterRadius) {
      const profile = buildInternalCavityProfilePoints(params, length, bodyZ0, postOuterRadius);
      const face = makeRevolveProfileFace(oc, profile.points);
      return {
        shape: revolveShape(oc, face),
        baseRadius: profile.baseRadius,
        tailRadius: profile.tailRadius
      };
    }

    function buildOuterHullByRevolve(oc, params, length, bodyZ0) {
      const outerProfile = buildOuterProfilePolyline(params, length, bodyZ0, PROFILE_SAMPLES);
      const outerFace = makeRevolveProfileFace(oc, outerProfile);
      return revolveShape(oc, outerFace);
    }

    function buildShellWithPostFilletsByRevolve(oc, params, length, bodyZ0, postOuterRadius) {
      const boreRadius = Math.max(0.05, params.bore * 0.5);
      const outerProfile = trimProfileToVerticals(
        buildOuterProfilePolyline(params, length, bodyZ0, PROFILE_SAMPLES),
        boreRadius,
        boreRadius
      );
      const cavityProfile = buildInternalCavityProfilePoints(
        params,
        length,
        bodyZ0,
        postOuterRadius
      );
      const sectionProfile = [
        { x: boreRadius, z: outerProfile[0].z },
        ...outerProfile,
        { x: boreRadius, z: outerProfile[outerProfile.length - 1].z }
      ];
      const outerWire = makeProfileWire(oc, sectionProfile);
      const cavityWire = makeProfileWire(oc, cavityProfile.points);
      const face = makeFaceFromWires(oc, outerWire, [cavityWire]);
      const boreStartZ = cavityProfile.points[0].z;
      const boreEndZ = cavityProfile.points[cavityProfile.points.length - 1].z;
      return {
        sectionFace: face,
        shape: revolveShape(oc, face),
        baseRadius: cavityProfile.baseRadius,
        tailRadius: cavityProfile.tailRadius,
        cavityProfilePoints: cavityProfile.points.map((point) => ({ ...point })),
        boreStartZ,
        boreEndZ
      };
    }

    function buildBoreCutByRevolve(oc, params, boreStartZ, boreEndZ) {
      const boreRadius = Math.max(0.05, params.bore * 0.5);
      const boreProfile = [
        { x: 0.0, z: boreStartZ },
        { x: boreRadius, z: boreStartZ },
        { x: boreRadius, z: boreEndZ },
        { x: 0.0, z: boreEndZ }
      ];
      const boreFace = makeFaceFromWire(oc, makeProfileWire(oc, boreProfile));
      return revolveShape(oc, boreFace);
    }

    function sampleArcPoints(centerX, centerZ, radius, startAngle, endAngle, segments = 8) {
      const pts = [];
      for (let i = 1; i <= segments; i += 1) {
        const t = i / segments;
        const angle = startAngle + (endAngle - startAngle) * t;
        pts.push({
          x: centerX + Math.cos(angle) * radius,
          z: centerZ + Math.sin(angle) * radius
        });
      }
      return pts;
    }

    function cross2d(a, b) {
      return a.x * b.z - a.z * b.x;
    }

    function intersectRayWithSegment2D(origin, direction, a, b, tolerance = 1.0e-6) {
      const segment = {
        x: b.x - a.x,
        z: b.z - a.z
      };
      const denominator = cross2d(direction, segment);
      if (Math.abs(denominator) <= tolerance) {
        return null;
      }

      const offset = {
        x: a.x - origin.x,
        z: a.z - origin.z
      };
      const tRay = cross2d(offset, segment) / denominator;
      const tSegment = cross2d(offset, direction) / denominator;
      if (tRay <= tolerance || tSegment < -tolerance || tSegment > 1.0 + tolerance) {
        return null;
      }

      return {
        t: tRay,
        point: {
          x: origin.x + direction.x * tRay,
          z: origin.z + direction.z * tRay
        }
      };
    }

    function findRayHitsOnClosedProfile(origin, direction, profilePoints, tolerance = 1.0e-5) {
      if (!profilePoints || profilePoints.length < 2) {
        return [];
      }

      const hits = [];
      for (let i = 0; i < profilePoints.length; i += 1) {
        const a = profilePoints[i];
        const b = profilePoints[(i + 1) % profilePoints.length];
        const hit = intersectRayWithSegment2D(origin, direction, a, b, tolerance);
        if (!hit) {
          continue;
        }
        const duplicate = hits.some((existing) => Math.abs(existing.t - hit.t) <= tolerance);
        if (!duplicate) {
          hits.push(hit);
        }
      }

      if (!hits.length) {
        return [];
      }

      hits.sort((left, right) => left.t - right.t);
      return hits;
    }

    function findFirstRayHitOnClosedProfile(origin, direction, profilePoints, tolerance = 1.0e-5) {
      const hits = findRayHitsOnClosedProfile(origin, direction, profilePoints, tolerance);
      return hits.length ? hits[0] : null;
    }

    function shapeOf(result) {
      return typeof result.Shape === "function" ? result.Shape() : result;
    }

    function makeVector(oc, x, y, z) {
      return instantiateAvailable(oc, ["gp_Vec_4", "gp_Vec_2", "gp_Vec_1", "gp_Vec"], [x, y, z]);
    }

    function extrudeShape(oc, shape, dx, dy, dz) {
      const vec = makeVector(oc, dx, dy, dz);
      return shapeOf(
        instantiateAvailableVariants(oc, [
          {
            names: ["BRepPrimAPI_MakePrism_1", "BRepPrimAPI_MakePrism"],
            args: [shape, vec, false, true]
          },
          {
            names: ["BRepPrimAPI_MakePrism_2", "BRepPrimAPI_MakePrism"],
            args: [shape, vec, false, false, true]
          }
        ])
      );
    }

    function cross3d(a, b) {
      return {
        x: a.y * b.z - a.z * b.y,
        y: a.z * b.x - a.x * b.z,
        z: a.x * b.y - a.y * b.x
      };
    }

    function normalize3d(vector) {
      const magnitude = Math.hypot(vector.x, vector.y, vector.z);
      if (magnitude <= 1.0e-9) {
        throw new Error("Vector is too small to normalize.");
      }
      return {
        x: vector.x / magnitude,
        y: vector.y / magnitude,
        z: vector.z / magnitude
      };
    }

    function fuseShapes(oc, a, b) {
      return shapeOf(
        instantiateAvailableVariants(oc, [
          { names: ["BRepAlgoAPI_Fuse_2", "BRepAlgoAPI_Fuse"], args: [a, b] },
          { names: ["BRepAlgoAPI_Fuse_3"], args: [a, b] }
        ])
      );
    }

    function cutShapes(oc, a, b) {
      return shapeOf(
        instantiateAvailableVariants(oc, [
          { names: ["BRepAlgoAPI_Cut_2", "BRepAlgoAPI_Cut"], args: [a, b] },
          { names: ["BRepAlgoAPI_Cut_3"], args: [a, b] }
        ])
      );
    }

    function intersectShapes(oc, a, b) {
      return shapeOf(
        instantiateAvailableVariants(oc, [
          { names: ["BRepAlgoAPI_Common_2", "BRepAlgoAPI_Common"], args: [a, b] },
          { names: ["BRepAlgoAPI_Common_3"], args: [a, b] }
        ])
      );
    }

    function makeCylinderBetween(oc, start, end, radius) {
      const dx = end[0] - start[0];
      const dy = end[1] - start[1];
      const dz = end[2] - start[2];
      const length = Math.hypot(dx, dy, dz);
      if (length <= 1e-6) {
        throw new Error("Cylinder axis is too short.");
      }
      const location = new oc.gp_Pnt_3(start[0], start[1], start[2]);
      const direction = instantiateAvailable(oc, ["gp_Dir_4", "gp_Dir_2"], [dx / length, dy / length, dz / length]);
      const axis = new oc.gp_Ax2_3(location, direction);
      return shapeOf(new oc.BRepPrimAPI_MakeCylinder_3(axis, radius, length));
    }

    function makeBoxFromCorner(oc, corner, dx, dy, dz) {
      return shapeOf(
        instantiateAvailableVariants(oc, [
          { names: ["BRepPrimAPI_MakeBox_4", "BRepPrimAPI_MakeBox_2", "BRepPrimAPI_MakeBox"], args: [corner, dx, dy, dz] }
        ])
      );
    }

    function transformShape(oc, shape, trsf) {
      return shapeOf(
        instantiateAvailableVariants(oc, [
          { names: ["BRepBuilderAPI_Transform_2", "BRepBuilderAPI_Transform"], args: [shape, trsf, true] },
          { names: ["BRepBuilderAPI_Transform_1", "BRepBuilderAPI_Transform"], args: [shape, trsf] }
        ])
      );
    }

    function rotateShapeAroundYAxis(oc, shape, pivotX, pivotY, pivotZ, angleDeg) {
      const trsf = instantiateAvailable(oc, ["gp_Trsf_1", "gp_Trsf"], []);
      const axisPoint = new oc.gp_Pnt_3(pivotX, pivotY, pivotZ);
      const axisDir = instantiateAvailable(oc, ["gp_Dir_4", "gp_Dir_2", "gp_Dir"], [0, 1, 0]);
      const axis = instantiateAvailableVariants(oc, [
        { names: ["gp_Ax1_3", "gp_Ax1_2", "gp_Ax1"], args: [axisPoint, axisDir] }
      ]);
      callFirstAvailableVariant(trsf, [
        { names: ["SetRotation_1", "SetRotation"], args: [axis, angleDeg * Math.PI / 180.0] }
      ]);
      return transformShape(oc, shape, trsf);
    }

    function rotateShapeAroundXAxis(oc, shape, pivotX, pivotY, pivotZ, angleDeg) {
      const trsf = instantiateAvailable(oc, ["gp_Trsf_1", "gp_Trsf"], []);
      const axisPoint = new oc.gp_Pnt_3(pivotX, pivotY, pivotZ);
      const axisDir = instantiateAvailable(oc, ["gp_Dir_4", "gp_Dir_2", "gp_Dir"], [1, 0, 0]);
      const axis = instantiateAvailableVariants(oc, [
        { names: ["gp_Ax1_3", "gp_Ax1_2", "gp_Ax1"], args: [axisPoint, axisDir] }
      ]);
      callFirstAvailableVariant(trsf, [
        { names: ["SetRotation_1", "SetRotation"], args: [axis, angleDeg * Math.PI / 180.0] }
      ]);
      return transformShape(oc, shape, trsf);
    }

    function cutCylinderEndAtAngle(oc, cylinder, {
      centerX,
      diameter,
      z0,
      height,
      angleDeg
    }) {
      if (angleDeg <= 0.0) {
        return cylinder;
      }

      const cutSpan = Math.max(height, diameter) * 4.0;
      const pivotZ = z0 + height;
      const sideSign = centerX >= 0.0 ? 1.0 : -1.0;
      const pivotX = centerX - sideSign * diameter * 0.5;
      const cutter = makeBoxFromCorner(
        oc,
        new oc.gp_Pnt_3(pivotX - cutSpan * 0.5, -cutSpan * 0.5, pivotZ),
        cutSpan,
        cutSpan,
        cutSpan
      );
      const rotatedCutter = rotateShapeAroundYAxis(
        oc,
        cutter,
        pivotX,
        0.0,
        pivotZ,
        sideSign * angleDeg
      );
      return cutShapes(oc, cylinder, rotatedCutter);
    }

    function makeVerticalCylinder(oc, centerX, centerY, z0, z1, radius) {
      return makeCylinderBetween(oc, [centerX, centerY, z0], [centerX, centerY, z1], radius);
    }

    function makeSquareBeam(oc, start, end, size) {
      const dx = end[0] - start[0];
      const dy = end[1] - start[1];
      const dz = end[2] - start[2];
      const length = Math.hypot(dx, dy, dz);
      if (length <= 1.0e-6) {
        throw new Error("Square beam axis is too short.");
      }

      const direction = normalize3d({ x: dx, y: dy, z: dz });
      const reference = Math.abs(direction.z) < 0.9
        ? { x: 0, y: 0, z: 1 }
        : { x: 0, y: 1, z: 0 };
      const xAxis = normalize3d(cross3d(reference, direction));
      const yAxis = normalize3d(cross3d(direction, xAxis));
      const half = size * 0.5;
      const square = [
        [
          start[0] - xAxis.x * half - yAxis.x * half,
          start[1] - xAxis.y * half - yAxis.y * half,
          start[2] - xAxis.z * half - yAxis.z * half
        ],
        [
          start[0] + xAxis.x * half - yAxis.x * half,
          start[1] + xAxis.y * half - yAxis.y * half,
          start[2] + xAxis.z * half - yAxis.z * half
        ],
        [
          start[0] + xAxis.x * half + yAxis.x * half,
          start[1] + xAxis.y * half + yAxis.y * half,
          start[2] + xAxis.z * half + yAxis.z * half
        ],
        [
          start[0] - xAxis.x * half + yAxis.x * half,
          start[1] - xAxis.y * half + yAxis.y * half,
          start[2] - xAxis.z * half + yAxis.z * half
        ]
      ];
      const face = makeFaceFromWire(oc, makeWireFrom3dPoints(oc, square));
      return extrudeShape(oc, face, dx, dy, dz);
    }

    function buildTripodBeams(oc, params, length, bodyZ0, diameter, baseRadius, baseAnchorZ) {
      const targets = [];
      const addRing = (worldZ, azimuthOffsetDeg) => {
        if (!Number.isFinite(worldZ) || worldZ <= 0) return;
        const inputLocalZ = worldZ - bodyZ0;
        const localZ = Math.max(0.5, Math.min(length - 0.5, inputLocalZ));
        const attachWorldZ = bodyZ0 + localZ;
        const attachRadius = Math.max(1.0, rAtLocalOriented(params, localZ, length, params.invertBase));
        for (const baseAngle of [0, 120, 240]) {
          const angleDeg = params.tripodOffsetDeg + azimuthOffsetDeg + baseAngle;
          const angleRad = angleDeg * Math.PI / 180.0;
          const top = [
            attachRadius * Math.cos(angleRad),
            attachRadius * Math.sin(angleRad),
            attachWorldZ
          ];
          const bottom = [
            (baseRadius - 2.4) * Math.cos(angleRad),
            (baseRadius - 2.4) * Math.sin(angleRad),
            baseAnchorZ
          ];
          targets.push(makeSquareBeam(oc, bottom, top, params.legThickness));
        }
      };

      addRing(params.tripodAttachZ, 0.0);
      if (params.tripodAttachZ2 > 0.0) {
        addRing(params.tripodAttachZ2, 60.0);
      }

      if (!targets.length) {
        return null;
      }

      return targets.reduce((acc, leg) => (acc ? fuseShapes(oc, acc, leg) : leg), null);
    }

    async function buildFloatShape(oc, params, onStep = null) {
      const { scale, length, diameter } = solveOuterDimensions(params);
      const bodyZ0 = params.noBase ? 0.0 : params.baseThickness + params.floatBaseGap;
      const postOuterRadius = params.bore * 0.5 + params.wallThickness;
      const ledAxis = params.ledCenterOffset;
      await yieldToBrowser("Building shell profile…");
      const shellResult = buildShellWithPostFilletsByRevolve(
        oc,
        params,
        length,
        bodyZ0,
        postOuterRadius
      );
      const cavityResult = buildInternalCavityWithPostFilletsByRevolve(
        oc,
        params,
        length,
        bodyZ0,
        postOuterRadius
      );
      const outerWorld = buildOuterHullByRevolve(oc, params, length, bodyZ0);
      const innerCavityWorld = cavityResult.shape;
      const shellOnly = cutShapes(oc, outerWorld, innerCavityWorld);
      const boreCore = makeVerticalCylinder(
        oc,
        0,
        0,
        bodyZ0,
        bodyZ0 + length + 0.8,
        postOuterRadius
      );
      const boreSupportTopZ = bodyZ0 + length + 0.8;
      const boreCut = makeVerticalCylinder(
        oc,
        0,
        0,
        bodyZ0 - 1.0,
        boreSupportTopZ + 1.0,
        Math.max(0.05, params.bore * 0.5)
      );
      const internalCavity = cutShapes(oc, innerCavityWorld, boreCore);
      await yieldToBrowser("Revolving shell and post…");
      let body = cutShapes(oc, outerWorld, internalCavity);
      let drainActive = false;
      const buildMetrics = (buildStage) => ({
        scale,
        length,
        diameter,
        bodyStartZ: bodyZ0,
        targetBuoyantVolumeCm3: params.buoyancyG,
        ledAxisOffset: ledAxis,
        drainActive,
        postBaseFilletRadius: cavityResult.baseRadius,
        postTailFilletRadius: cavityResult.tailRadius,
        buildStage
      });
      async function emitStep(buildStage, shape) {
        if (!onStep || !shape) return;
        await onStep({
          shape,
          metrics: buildMetrics(buildStage)
        });
      }
      await yieldToBrowser("Cutting bore…");
      body = cutShapes(oc, body, boreCut);
      await emitStep("Shell + Post + Bore", body);

      const ledSleeveRaw = makeVerticalCylinder(
        oc,
        ledAxis,
        0,
        bodyZ0,
        bodyZ0 + params.ledLen,
        params.ledD * 0.5 + params.wallThickness
      );
      const ledSleeveCut = cutCylinderEndAtAngle(oc, ledSleeveRaw, {
        centerX: ledAxis,
        diameter: 2.0 * (params.ledD * 0.5 + params.wallThickness),
        z0: bodyZ0,
        height: params.ledLen,
        angleDeg: LED_SLEEVE_END_CUT_DEG
      });
      const ledBayRaw = makeVerticalCylinder(
        oc,
        ledAxis,
        0,
        bodyZ0 - 0.5,
        bodyZ0 + Math.max(params.ledLen + 0.5, params.wallThickness) + 0.5,
        params.ledD * 0.5
      );
      const ledBayCut = cutCylinderEndAtAngle(oc, ledBayRaw, {
        centerX: ledAxis,
        diameter: params.ledD,
        z0: bodyZ0 - 0.5,
        height: Math.max(params.ledLen + 0.5, params.wallThickness) + 1.0,
        angleDeg: LED_SLEEVE_END_CUT_DEG
      });
      const ledSleeve = intersectShapes(oc, ledSleeveCut, outerWorld);
      const ledBay = intersectShapes(oc, ledBayCut, outerWorld);
      await yieldToBrowser("Adding LED sleeve…");
      try {
        const ledSleeveRing = cutShapes(oc, ledSleeve, ledBay);
        const ledFill = intersectShapes(oc, ledSleeveRing, internalCavity);
        body = fuseShapes(oc, body, ledFill);
        await emitStep("LED Sleeve", body);
      } catch (err) {
        console.warn("LED sleeve trim skipped:", err);
      }
      await yieldToBrowser("Cutting LED bay…");
      body = cutShapes(oc, body, ledBay);
      await emitStep("LED Bay", body);
      if (!params.noDrain && params.drainHoleDiameter > 0.0) {
        const drainStartLocalZ = Math.min(length - 0.2, Math.max(params.drainHoleDiameter, 0.2));
        const directionSign = ledAxis >= 0.0 ? -1.0 : 1.0;
        const angleRad = params.drainAngleDeg * Math.PI / 180.0;
        const drainStartRadius = 0.0;
        const drainStart2d = {
          x: drainStartRadius,
          z: bodyZ0 + drainStartLocalZ
        };
        const drainDirection2d = {
          x: Math.cos(angleRad),
          z: Math.sin(angleRad)
        };
        const drainHits = findRayHitsOnClosedProfile(
          drainStart2d,
          drainDirection2d,
          shellResult.cavityProfilePoints
        );
        const drainExitHit = drainHits.length >= 2 ? drainHits[1] : (drainHits.length === 1 ? drainHits[0] : null);
        if (!drainExitHit) {
          console.warn("Drain hole skipped: no valid cavity exit found.");
        } else {
          const drainRadius = params.drainHoleDiameter * 0.5;
          const cavityWallClearance = Math.max(0.05, drainRadius + 0.02);
          const drainLengthTrim = cavityWallClearance + Math.max(0.0, params.wallThickness);
          const drainEndT = Math.max(0.05, drainExitHit.t - drainLengthTrim);
          const drainStart = [
            directionSign * drainStartRadius,
            0,
            drainStart2d.z
          ];
          const drainEnd = [
            directionSign * Math.max(
              0.0,
              drainStart2d.x + drainDirection2d.x * drainEndT
            ),
            0,
            drainStart2d.z + drainDirection2d.z * drainEndT
          ];
          const drainCut = makeCylinderBetween(oc, drainStart, drainEnd, drainRadius);
        await yieldToBrowser("Cutting drain hole…");
        body = cutShapes(oc, body, drainCut);
        drainActive = true;
        await emitStep("Drain Hole", body);
      }

      }

      if (params.invertBase) {
        await yieldToBrowser("Rotating float 180° for inverted base…");
        body = rotateShapeAroundXAxis(oc, body, 0.0, 0.0, bodyZ0 + 0.5 * length, 180.0);
        await emitStep("Float Rotated 180", body);
      }

      if (!params.noBase) {
        const supportRadius = postOuterRadius;
        const supportLocalZ = firstLocalZForRadiusOriented(
          params,
          length,
          supportRadius,
          params.invertBase
        );
        const supportAttachZ = bodyZ0 + supportLocalZ;
        const baseRadius = Math.max(diameter * params.baseRadiusFactor, supportRadius + 8.0);
        const baseBottomZ = 0.0;
        const baseTopZ = params.baseThickness;
        const baseAnchorZ = baseTopZ;
        const basePlate = makeVerticalCylinder(oc, 0, 0, baseBottomZ, baseTopZ, baseRadius);
        const support = makeVerticalCylinder(oc, 0, 0, baseAnchorZ, supportAttachZ, supportRadius);
        await yieldToBrowser("Adding base support…");
        body = fuseShapes(oc, body, basePlate);
        body = fuseShapes(oc, body, support);
        await yieldToBrowser("Building tripod…");
        const tripod = buildTripodBeams(oc, params, length, bodyZ0, diameter, baseRadius, baseAnchorZ);
        if (tripod) {
          await yieldToBrowser("Fusing tripod…");
          body = fuseShapes(oc, body, tripod);
        }
        await emitStep("Base Support + Tripod", body);
      }

      return {
        shape: body,
        metrics: buildMetrics("Final")
      };
    }

    async function tessellateShape(oc, shape) {
      new oc.BRepMesh_IncrementalMesh_2(shape, DEFAULT_LINEAR_DEFLECTION, false, DEFAULT_ANGULAR_DEFLECTION, false);
      const positions = [];
      const normals = [];
      const indices = [];
      let vertexOffset = 0;
      let faceCount = 0;
      const explorer = new oc.TopExp_Explorer_1();
      explorer.Init(shape, oc.TopAbs_ShapeEnum.TopAbs_FACE, oc.TopAbs_ShapeEnum.TopAbs_SHAPE);
      for (; explorer.More(); explorer.Next()) {
        faceCount += 1;
        if (faceCount % 8 === 0) {
          await yieldToBrowser("Meshing preview…");
        }
        const face = oc.TopoDS.Face_1(explorer.Current());
        const location = new oc.TopLoc_Location_1();
        const triangulationHandle = callFunctionVariants(
          oc.BRep_Tool.Triangulation.bind(oc.BRep_Tool),
          [
            [face, location],
            [face, location, 0]
          ]
        );
        if (triangulationHandle.IsNull()) {
          continue;
        }
        const triangulation = triangulationHandle.get();
        const transform = location.Transformation();
        const connect = new oc.Poly_Connect_2(triangulationHandle);
        const faceNormals = new oc.TColgp_Array1OfDir_2(1, triangulation.NbNodes());
        oc.StdPrs_ToolTriangulatedShape.Normal(face, connect, faceNormals);

        for (let nodeIndex = 1; nodeIndex <= triangulation.NbNodes(); nodeIndex += 1) {
          const p = triangulation.Node(nodeIndex).Transformed(transform);
          positions.push(p.X(), p.Y(), p.Z());
          const n = faceNormals.Value(nodeIndex).Transformed(transform);
          normals.push(n.X(), n.Y(), n.Z());
        }

        const triangles = triangulation.Triangles();
        const forward = face.Orientation_1() === oc.TopAbs_Orientation.TopAbs_FORWARD;
        for (let triIndex = 1; triIndex <= triangulation.NbTriangles(); triIndex += 1) {
          const tri = triangles.Value(triIndex);
          let n1 = tri.Value(1) - 1;
          let n2 = tri.Value(2) - 1;
          let n3 = tri.Value(3) - 1;
          if (!forward) {
            const tmp = n1;
            n1 = n2;
            n2 = tmp;
          }
          indices.push(vertexOffset + n1, vertexOffset + n2, vertexOffset + n3);
        }

        vertexOffset += triangulation.NbNodes();
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));
      geometry.setIndex(indices);
      geometry.computeBoundingBox();
      geometry.computeBoundingSphere();
      return geometry;
    }

    function disposeCurrentMesh() {
      if (!state.currentMesh) return;
      disposeSectionBox();
      if (state.currentOverlay) {
        state.scene.remove(state.currentOverlay);
        state.currentOverlay.geometry.dispose();
        state.currentOverlay.material.dispose();
        state.currentOverlay = null;
      }
      state.scene.remove(state.currentMesh);
      state.currentMesh.geometry.dispose();
      state.currentMesh.material.dispose();
      state.currentMesh = null;
    }

    function fitCameraToCurrentMesh(viewMode = "auto") {
      if (!state.currentMesh) return;
      const box = new THREE.Box3().setFromObject(state.currentMesh);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxSize = Math.max(size.x, size.y, size.z, 1);
      const distance = maxSize * 2.2;
      if (viewMode === "front") {
        state.camera.position.set(center.x, center.y, center.z + distance);
      } else {
        state.camera.position.set(center.x + distance, center.y + distance * 0.7, center.z + distance);
      }
      state.controls.target.copy(center);
      state.controls.update();
    }

    async function renderCurrentShape(shape, metrics, options = {}) {
      const hadMesh = Boolean(state.currentMesh);
      const persistedViewport = hadMesh ? buildSavePayload().viewport : state.pendingViewportState;
      const preservedView = options.preserveView || null;
      const isFinal = (options.final !== undefined ? options.final : true) && metrics?.buildStage !== "2D Section";
      disposeCurrentMesh();
      const geometry = await tessellateShape(state.oc, shape);
      const isSectionStage = metrics?.buildStage === "2D Section";
      const material = createPreviewMeshMaterial(isSectionStage);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.rotation.x = -Math.PI / 2;
      state.scene.add(mesh);
      state.currentMesh = mesh;
      if (isSectionStage) {
        const edgeLines = new THREE.LineSegments(
          new THREE.EdgesGeometry(geometry),
          new THREE.LineBasicMaterial({
            color: 0x1b2b38,
            depthTest: false,
            transparent: false
          })
        );
        edgeLines.rotation.copy(mesh.rotation);
        edgeLines.renderOrder = 10;
        state.scene.add(edgeLines);
        state.currentOverlay = edgeLines;
      }
      state.currentMetrics = metrics;
      applyMeshTransparency();
      const fitCamera = options.fitCamera !== undefined
        ? options.fitCamera
        : (!preservedView && (!isFinal || (!hadMesh && !state.restoreViewportOnNextRender)));
      if (fitCamera) {
        fitCameraToCurrentMesh(isSectionStage ? "front" : "auto");
      }
      if (isSectionStage) {
        disposeSectionBox();
      } else {
        buildSectionBoxForMesh(mesh);
        if (preservedView) {
          applySavedCameraState(preservedView.camera);
          if (preservedView.viewport?.sectionBoxCurrent) {
            applySavedSectionBoxBounds(preservedView.viewport.sectionBoxCurrent);
          }
        } else if (persistedViewport && isFinal) {
          state.pendingViewportState = persistedViewport;
          applyPendingViewportStateToCurrentMesh();
        }
      }
      state.restoreViewportOnNextRender = false;
      ui.exportStepBtn.disabled = !isFinal;
      ui.exportStlBtn.disabled = !isFinal;
      renderMetrics(metrics);
    }

    function renderMetrics(metrics) {
      ui.viewportStage.textContent = `Stage: ${metrics.buildStage ?? "Final"}`;
      ui.metrics.innerHTML = [
        `Scale: <code>${metrics.scale.toFixed(4)}</code>`,
        `Length: <code>${metrics.length.toFixed(2)} mm</code>`,
        `Diameter: <code>${metrics.diameter.toFixed(2)} mm</code>`,
        `Body start: <code>${metrics.bodyStartZ.toFixed(2)} mm</code>`,
        `Target buoyancy: <code>${metrics.targetBuoyantVolumeCm3.toFixed(2)} cm^3</code>`,
        `LED axis offset: <code>${metrics.ledAxisOffset.toFixed(2)} mm</code>`,
        `Drain hole: <code>${metrics.drainActive ? "on" : "off"}</code>`,
        `Post base fillet: <code>${metrics.postBaseFilletRadius.toFixed(2)} mm</code>`,
        `Post tail fillet: <code>${metrics.postTailFilletRadius.toFixed(2)} mm</code>`
      ].join("<br>");
    }

    function buildMirroredSectionOutline(points) {
      return [
        ...points.map((pt) => ({ x: pt.x, y: pt.z })),
        ...points.slice().reverse().map((pt) => ({ x: -pt.x, y: pt.z }))
      ];
    }

    function traceSectionPolygon(ctx, points, projectPoint) {
      if (!points.length) return;
      ctx.beginPath();
      for (let i = 0; i < points.length; i += 1) {
        const projected = projectPoint(points[i]);
        if (i === 0) {
          ctx.moveTo(projected.x, projected.y);
        } else {
          ctx.lineTo(projected.x, projected.y);
        }
      }
      ctx.closePath();
    }

    function drawArrowHead(ctx, tipX, tipY, dirX, dirY, size) {
      const len = Math.hypot(dirX, dirY) || 1.0;
      const ux = dirX / len;
      const uy = dirY / len;
      const px = -uy;
      const py = ux;
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - ux * size + px * size * 0.55, tipY - uy * size + py * size * 0.55);
      ctx.lineTo(tipX - ux * size - px * size * 0.55, tipY - uy * size - py * size * 0.55);
      ctx.closePath();
      ctx.fill();
    }

    function drawDirectionIndicator(ctx, centerX, centerY, axis, color) {
      const len = 24;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 1.4;
      const segments = [];
      if (axis === "x" || axis === "xy") {
        segments.push({ dx: len, dy: 0 });
      }
      if (axis === "y" || axis === "xy") {
        segments.push({ dx: 0, dy: -len });
      }
      for (const segment of segments) {
        ctx.beginPath();
        ctx.moveTo(centerX - segment.dx, centerY - segment.dy);
        ctx.lineTo(centerX + segment.dx, centerY + segment.dy);
        ctx.stroke();
        drawArrowHead(ctx, centerX + segment.dx, centerY + segment.dy, segment.dx, segment.dy, 6);
        drawArrowHead(ctx, centerX - segment.dx, centerY - segment.dy, -segment.dx, -segment.dy, 6);
      }
      ctx.restore();
    }

    function drawHandleLabel(ctx, text, x, y, align = "center", rotationDeg = 0) {
      ctx.save();
      ctx.font = "12px ui-sans-serif, system-ui, -apple-system, Segoe UI";
      const padX = 6;
      const padY = 4;
      const metrics = ctx.measureText(text);
      const width = metrics.width + padX * 2;
      const height = 18;
      const angle = Number(rotationDeg) * Math.PI / 180.0;
      ctx.translate(x, y);
      if (Math.abs(angle) > 1.0e-9) {
        ctx.rotate(angle);
      }
      let left = -width * 0.5;
      if (align === "left") left = 0;
      if (align === "right") left = -width;
      const top = -height * 0.5;
      ctx.fillStyle = "rgba(8, 12, 16, 0.88)";
      ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
      ctx.lineWidth = 1;
      ctx.fillRect(left, top, width, height);
      ctx.strokeRect(left, top, width, height);
      ctx.fillStyle = "rgba(234, 242, 250, 0.96)";
      ctx.fillText(text, left + padX, top + height - padY - 1);
      ctx.restore();
    }

    function traceSectionPolyline(ctx, points, projectPoint) {
      if (!points.length) return;
      ctx.beginPath();
      for (let i = 0; i < points.length; i += 1) {
        const projected = projectPoint(points[i]);
        if (i === 0) {
          ctx.moveTo(projected.x, projected.y);
        } else {
          ctx.lineTo(projected.x, projected.y);
        }
      }
    }

    function drawSectionMarkers(ctx, points, projectPoint, radius, fillStyle, strokeStyle = "rgba(10,14,18,0.9)") {
      if (!points.length) return;
      ctx.save();
      ctx.fillStyle = fillStyle;
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = 1;
      for (const point of points) {
        const projected = projectPoint(point);
        ctx.beginPath();
        ctx.arc(projected.x, projected.y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawFilletGuideLine(ctx, points, projectPoint, strokeStyle, labelText = "") {
      if (!points || points.length < 2) {
        return;
      }
      const start = projectPoint(points[0]);
      const end = projectPoint(points[points.length - 1]);
      ctx.save();
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = 1.4;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      if (labelText) {
        drawHandleLabel(
          ctx,
          labelText,
          0.5 * (start.x + end.x),
          0.5 * (start.y + end.y) - 14,
          "center"
        );
      }
    }

    function buildAngledTubeSection(centerX, outerRadius, innerRadius, z0, height, angleDeg) {
      const topZ = z0 + Math.max(0.0, height);
      const sideSign = centerX >= 0.0 ? 1.0 : -1.0;
      const slope = angleDeg > 0.0 ? Math.tan(angleDeg * Math.PI / 180.0) : 0.0;

      function buildRadiusProfile(radius) {
        if (!(radius > 0.0)) {
          return [];
        }
        const leftX = centerX - radius;
        const rightX = centerX + radius;
        if (!(slope > 0.0)) {
          return [
            { x: leftX, y: z0 },
            { x: rightX, y: z0 },
            { x: rightX, y: topZ },
            { x: leftX, y: topZ }
          ];
        }
        const pivotX = centerX - sideSign * radius;
        const topAt = (x) => {
          const distanceAcross = Math.max(0.0, sideSign * (x - pivotX));
          return Math.max(z0, topZ - distanceAcross * slope);
        };
        return [
          { x: leftX, y: z0 },
          { x: rightX, y: z0 },
          { x: rightX, y: topAt(rightX) },
          { x: leftX, y: topAt(leftX) }
        ];
      }

      return {
        outer: buildRadiusProfile(outerRadius),
        inner: buildRadiusProfile(innerRadius)
      };
    }

    function buildDrainHoleSectionOverlay(params, bodyZ0, length, cavityProfilePoints) {
      if (params.noDrain || !(params.drainHoleDiameter > 0.0) || !Array.isArray(cavityProfilePoints) || cavityProfilePoints.length < 2) {
        return null;
      }
      const drainStartLocalZ = Math.min(length - 0.2, Math.max(params.drainHoleDiameter, 0.2));
      const directionSign = params.ledCenterOffset >= 0.0 ? -1.0 : 1.0;
      const angleRad = params.drainAngleDeg * Math.PI / 180.0;
      const drainStart2d = { x: 0.0, z: bodyZ0 + drainStartLocalZ };
      const drainDirection2d = { x: Math.cos(angleRad), z: Math.sin(angleRad) };
      const drainHits = findRayHitsOnClosedProfile(drainStart2d, drainDirection2d, cavityProfilePoints);
      const drainExitHit = drainHits.length >= 2 ? drainHits[1] : (drainHits.length === 1 ? drainHits[0] : null);
      if (!drainExitHit) {
        return null;
      }
      const drainRadius = params.drainHoleDiameter * 0.5;
      const cavityWallClearance = Math.max(0.05, drainRadius + 0.02);
      const drainLengthTrim = cavityWallClearance + Math.max(0.0, params.wallThickness);
      const drainEndT = Math.max(0.05, drainExitHit.t - drainLengthTrim);
      const start = { x: 0.0, y: drainStart2d.z };
      const end = {
        x: directionSign * Math.max(0.0, drainStart2d.x + drainDirection2d.x * drainEndT),
        y: drainStart2d.z + drainDirection2d.z * drainEndT
      };
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const axisLength = Math.hypot(dx, dy);
      if (axisLength <= 1.0e-6) {
        return null;
      }
      const nx = -dy / axisLength * drainRadius;
      const ny = dx / axisLength * drainRadius;
      return {
        polygon: [
          { x: start.x + nx, y: start.y + ny },
          { x: end.x + nx, y: end.y + ny },
          { x: end.x - nx, y: end.y - ny },
          { x: start.x - nx, y: start.y - ny }
        ],
        centerline: [start, end]
      };
    }

    function getInputRange(input) {
      const minRaw = typeof input.min === "string" ? input.min.trim() : "";
      const maxRaw = typeof input.max === "string" ? input.max.trim() : "";
      const min = minRaw === "" ? -Infinity : Number(minRaw);
      const max = maxRaw === "" ? Infinity : Number(maxRaw);
      return {
        min: Number.isFinite(min) ? min : -Infinity,
        max: Number.isFinite(max) ? max : Infinity
      };
    }

    function snapToInputStep(input, value) {
      const step = Number(input.step);
      if (!Number.isFinite(step) || step <= 0) {
        return value;
      }
      const min = Number(input.min);
      const base = Number.isFinite(min) ? min : 0;
      return base + Math.round((value - base) / step) * step;
    }

    function setInputNumericValue(input, value) {
      const previous = Number(input.value);
      const range = getInputRange(input);
      const clamped = THREE.MathUtils.clamp(value, range.min, range.max);
      const snapped = snapToInputStep(input, clamped);
      const finalValue = Number.isFinite(snapped) ? snapped : clamped;
      if (!Number.isFinite(finalValue)) {
        return false;
      }
      if (Number.isFinite(previous) && Math.abs(previous - finalValue) < 1.0e-9) {
        return false;
      }
      input.value = String(finalValue);
      return true;
    }

    function sanitizeProfileHandleOffsets(raw) {
      if (!raw || typeof raw !== "object") {
        return {};
      }
      const result = {};
      for (const [id, value] of Object.entries(raw)) {
        if (!value || typeof value !== "object") {
          continue;
        }
        const x = Number(value.x);
        const y = Number(value.y);
        const safeX = Number.isFinite(x) ? x : 0;
        const safeY = Number.isFinite(y) ? y : 0;
        if (Math.abs(safeX) < 1.0e-6 && Math.abs(safeY) < 1.0e-6) {
          continue;
        }
        result[id] = { x: safeX, y: safeY };
      }
      return result;
    }

    function getProfileHandleOffset(id) {
      const raw = state.profileHandleOffsets?.[id];
      const x = Number(raw?.x);
      const y = Number(raw?.y);
      return {
        x: Number.isFinite(x) ? x : 0,
        y: Number.isFinite(y) ? y : 0
      };
    }

    function setProfileHandleOffset(id, x, y) {
      const next = {
        x: Number.isFinite(x) ? x : 0,
        y: Number.isFinite(y) ? y : 0
      };
      const previous = getProfileHandleOffset(id);
      if (Math.abs(previous.x - next.x) < 1.0e-6 && Math.abs(previous.y - next.y) < 1.0e-6) {
        return false;
      }
      if (Math.abs(next.x) < 1.0e-6 && Math.abs(next.y) < 1.0e-6) {
        delete state.profileHandleOffsets[id];
      } else {
        state.profileHandleOffsets[id] = next;
      }
      return true;
    }

    function getProfileCanvasPoint(event) {
      const rect = profileCanvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function pointToSegmentDistance(point, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const segmentLengthSq = dx * dx + dy * dy;
      if (segmentLengthSq <= 1.0e-9) {
        const px = point.x - a.x;
        const py = point.y - a.y;
        return Math.hypot(px, py);
      }
      const t = Math.max(0.0, Math.min(1.0, ((point.x - a.x) * dx + (point.y - a.y) * dy) / segmentLengthSq));
      const closestX = a.x + dx * t;
      const closestY = a.y + dy * t;
      return Math.hypot(point.x - closestX, point.y - closestY);
    }

    function isPointNearPolyline(point, polyline, thresholdPx = 10) {
      if (!Array.isArray(polyline) || polyline.length < 2) {
        return false;
      }
      for (let i = 1; i < polyline.length; i += 1) {
        if (pointToSegmentDistance(point, polyline[i - 1], polyline[i]) <= thresholdPx) {
          return true;
        }
      }
      return false;
    }

    function getProfileHandleAt(point) {
      const interaction = state.profileFilletInteraction;
      const handles = interaction?.handles;
      if (!Array.isArray(handles) || !handles.length) {
        return null;
      }
      for (let i = handles.length - 1; i >= 0; i -= 1) {
        const handle = handles[i];
        const dx = point.x - handle.x;
        const dy = point.y - handle.y;
        const radius = (handle.radius || 8) + 4;
        if (dx * dx + dy * dy <= radius * radius) {
          return handle;
        }
      }
      const curveTargets = interaction?.curveTargets;
      if (Array.isArray(curveTargets) && curveTargets.length) {
        for (let i = curveTargets.length - 1; i >= 0; i -= 1) {
          const target = curveTargets[i];
          if (isPointNearPolyline(point, target.polyline, target.hitRadius || 10)) {
            return target;
          }
        }
      }
      return null;
    }

    function getProfileKnobAt(point) {
      const handles = state.profileFilletInteraction?.handles;
      if (!Array.isArray(handles) || !handles.length) {
        return null;
      }
      for (let i = handles.length - 1; i >= 0; i -= 1) {
        const handle = handles[i];
        const dx = point.x - handle.x;
        const dy = point.y - handle.y;
        const radius = (handle.radius || 8) + 4;
        if (dx * dx + dy * dy <= radius * radius) {
          return handle;
        }
      }
      return null;
    }

    function getProfileDragTargetById(id) {
      const interaction = state.profileFilletInteraction;
      if (!interaction) {
        return null;
      }
      const handles = Array.isArray(interaction.handles) ? interaction.handles : [];
      const curveTargets = Array.isArray(interaction.curveTargets) ? interaction.curveTargets : [];
      return [...handles, ...curveTargets].find((item) => item.id === id) || null;
    }

    function applyProfileHandleDrag(handle, startValue, dx, dy, point = null) {
      if (handle.dragMode === "bi2d") {
        const nextX = startValue.x
          + dx * (Number.isFinite(handle.axisSignX) ? handle.axisSignX : 1)
          * handle.sensitivityX;
        const nextY = startValue.y
          + dy * (Number.isFinite(handle.axisSignY) ? handle.axisSignY : -1)
          * handle.sensitivityY;
        const changedX = setInputNumericValue(handle.inputX, nextX);
        const changedY = setInputNumericValue(handle.inputY, nextY);
        return changedX || changedY;
      }
      if (handle.dragMode === "drainAngle") {
        if (!point || !handle.anchor) {
          return false;
        }
        const horizontal = Math.abs(point.x - handle.anchor.x);
        const vertical = Math.max(0.0, handle.anchor.y - point.y);
        const next = THREE.MathUtils.radToDeg(Math.atan2(vertical, Math.max(horizontal, 1.0e-6)));
        return setInputNumericValue(handle.input, next);
      }
      const rawAxisDelta = handle.axis === "x" ? dx : dy;
      const dragThresholdPx = Math.max(0, Number(handle.dragThresholdPx) || 0);
      if (Math.abs(rawAxisDelta) <= dragThresholdPx) {
        return false;
      }
      const effectiveAxisDelta = rawAxisDelta - Math.sign(rawAxisDelta) * dragThresholdPx;
      const axisSign = Number.isFinite(handle.axisSign)
        ? handle.axisSign
        : (handle.axis === "x" ? 1 : -1);
      const axisDelta = effectiveAxisDelta * axisSign;
      const next = startValue + axisDelta * handle.sensitivity;
      return setInputNumericValue(handle.input, next);
    }

    function getProfileHandleStartValue(handle) {
      if (handle.dragMode === "bi2d") {
        return {
          x: Number(handle.inputX.value),
          y: Number(handle.inputY.value)
        };
      }
      return Number(handle.input.value);
    }

    function updateProfileCursor(point = null) {
      if (state.profileFilletDrag) {
        const dragHandle = state.profileFilletDrag.mode === "layout"
          ? "move"
          : (state.profileFilletDrag.cursor
            || (state.profileFilletDrag.axis === "x" ? "ew-resize" : "ns-resize"));
        profileCanvas.style.cursor = dragHandle;
        return;
      }
      if (point) {
        const hovered = getProfileHandleAt(point);
        profileCanvas.style.cursor = hovered ? hovered.cursor : "default";
        return;
      }
      profileCanvas.style.cursor = "default";
    }

    function drawProfile() {
      const params = getParams();
      const { length, diameter } = solveOuterDimensions(params);
      const bodyZ0 = 0.0;
      const boreRadius = Math.max(0.05, params.bore * 0.5);
      const postOuterRadius = params.bore * 0.5 + params.wallThickness;
      const outerProfile = trimProfileToVerticals(
        buildOuterProfilePolyline(params, length, bodyZ0, PROFILE_SAMPLES),
        boreRadius,
        boreRadius
      );
      const cavityResult = buildInternalCavityProfilePoints(
        params,
        length,
        bodyZ0,
        postOuterRadius
      );
      const cavityProfile = cavityResult.points;
      const materialBoundaryHalf = [
        { x: boreRadius, y: outerProfile[0].z },
        ...outerProfile.map((pt) => ({ x: pt.x, y: pt.z })),
        { x: boreRadius, y: outerProfile[outerProfile.length - 1].z }
      ];
      const cavityBoundaryHalf = cavityProfile.map((pt) => ({ x: pt.x, y: pt.z }));
      const cavityWallBoundaryHalf = cavityProfile.length >= 2
        ? [
            { x: cavityProfile[0].x, y: cavityProfile[0].z },
            {
              x: cavityProfile[cavityProfile.length - 1].x,
              y: cavityProfile[cavityProfile.length - 1].z
            }
          ]
        : [];
      const baseFilletBoundaryHalf = cavityResult.baseFilletPath.map((pt) => ({ x: pt.x, y: pt.z }));
      const tailFilletBoundaryHalf = cavityResult.tailFilletPath.map((pt) => ({ x: pt.x, y: pt.z }));
      const mirroredOuter = buildMirroredSectionOutline(outerProfile);
      const width = Math.max(320, profileCanvas.clientWidth);
      const height = Math.max(320, profileCanvas.clientHeight);
      if (profileCanvas.width !== width || profileCanvas.height !== height) {
        profileCanvas.width = width;
        profileCanvas.height = height;
      }

      profileCtx.clearRect(0, 0, width, height);
      const minX = Math.min(...mirroredOuter.map((pt) => pt.x));
      const maxX = Math.max(...mirroredOuter.map((pt) => pt.x));
      const minY = Math.min(...mirroredOuter.map((pt) => pt.y));
      const maxY = Math.max(...mirroredOuter.map((pt) => pt.y));
      const boundsWidth = Math.max(maxX - minX, 0.001);
      const boundsHeight = Math.max(maxY - minY, 0.001);
      const padding = 62;
      const scaleX = (width - 2 * padding) / boundsWidth;
      const scaleY = (height - 2 * padding) / boundsHeight;
      const scale = Math.max(0.1, Math.min(scaleX, scaleY));
      const centerX = 0.0;
      const centerY = 0.5 * (minY + maxY);
      const cx = width * 0.5;
      const canvasRect = profileCanvas.getBoundingClientRect();
      const cy = window.innerHeight * 0.5 - canvasRect.top;
      const projectPoint = (pt) => ({
        x: cx + (pt.x - centerX) * scale,
        y: cy - (pt.y - centerY) * scale
      });
      const projectMirrorPoint = (pt) => ({
        x: cx + ((-pt.x) - centerX) * scale,
        y: cy - (pt.y - centerY) * scale
      });

      profileCtx.strokeStyle = "rgba(255, 160, 64, 0.9)";
      profileCtx.lineWidth = 1;
      profileCtx.setLineDash([8, 6]);
      profileCtx.beginPath();
      profileCtx.moveTo(cx + (0 - centerX) * scale, cy - (minY - centerY) * scale);
      profileCtx.lineTo(cx + (0 - centerX) * scale, cy - (maxY - centerY) * scale);
      profileCtx.stroke();
      profileCtx.setLineDash([]);

      profileCtx.fillStyle = "rgba(126, 198, 255, 0.12)";
      traceSectionPolygon(profileCtx, materialBoundaryHalf, projectPoint);
      profileCtx.fill();
      traceSectionPolygon(profileCtx, materialBoundaryHalf, projectMirrorPoint);
      profileCtx.fill();

      profileCtx.strokeStyle = "#7ec6ff";
      profileCtx.lineWidth = 2;
      traceSectionPolygon(profileCtx, materialBoundaryHalf, projectPoint);
      profileCtx.stroke();
      traceSectionPolygon(profileCtx, materialBoundaryHalf, projectMirrorPoint);
      profileCtx.stroke();

      profileCtx.strokeStyle = "rgba(231, 192, 120, 0.95)";
      profileCtx.lineWidth = 1.5;
      traceSectionPolyline(profileCtx, cavityBoundaryHalf, projectPoint);
      profileCtx.stroke();
      traceSectionPolyline(profileCtx, cavityBoundaryHalf, projectMirrorPoint);
      profileCtx.stroke();
      if (cavityWallBoundaryHalf.length === 2) {
        traceSectionPolyline(profileCtx, cavityWallBoundaryHalf, projectPoint);
        profileCtx.stroke();
        traceSectionPolyline(profileCtx, cavityWallBoundaryHalf, projectMirrorPoint);
        profileCtx.stroke();
      }

      profileCtx.strokeStyle = "rgba(255, 96, 160, 0.98)";
      profileCtx.lineWidth = 5;
      profileCtx.lineCap = "round";
      profileCtx.lineJoin = "round";
      if (cavityResult.baseRadius > 0.0) {
        traceSectionPolyline(profileCtx, baseFilletBoundaryHalf, projectPoint);
        profileCtx.stroke();
        traceSectionPolyline(profileCtx, baseFilletBoundaryHalf, projectMirrorPoint);
        profileCtx.stroke();
        drawFilletGuideLine(
          profileCtx,
          baseFilletBoundaryHalf,
          projectPoint,
          "rgba(255, 160, 192, 0.9)"
        );
        drawFilletGuideLine(
          profileCtx,
          baseFilletBoundaryHalf,
          projectMirrorPoint,
          "rgba(255, 160, 192, 0.9)",
          `R ${cavityResult.baseRadius.toFixed(1)} mm`
        );
      }
      if (cavityResult.tailRadius > 0.0) {
        traceSectionPolyline(profileCtx, tailFilletBoundaryHalf, projectPoint);
        profileCtx.stroke();
        traceSectionPolyline(profileCtx, tailFilletBoundaryHalf, projectMirrorPoint);
        profileCtx.stroke();
        drawFilletGuideLine(
          profileCtx,
          tailFilletBoundaryHalf,
          projectPoint,
          "rgba(255, 160, 192, 0.9)"
        );
        drawFilletGuideLine(
          profileCtx,
          tailFilletBoundaryHalf,
          projectMirrorPoint,
          "rgba(255, 160, 192, 0.9)",
          `R ${cavityResult.tailRadius.toFixed(1)} mm`
        );
      }

      const ledOuterRadius = params.ledD * 0.5 + params.wallThickness;
      const ledInnerRadius = params.ledD * 0.5;
      const ledSection = buildAngledTubeSection(
        params.ledCenterOffset,
        ledOuterRadius,
        ledInnerRadius,
        bodyZ0,
        params.ledLen,
        LED_SLEEVE_END_CUT_DEG
      );
      const ledLengthLine = ledSection.outer.length >= 4
        ? [ledSection.outer[0], ledSection.outer[3]]
        : [];
      const ledDiameterLine = ledSection.outer.length >= 4
        ? [ledSection.outer[0], ledSection.outer[1], ledSection.outer[2]]
        : [];
      if (ledSection.outer.length >= 3) {
        profileCtx.fillStyle = "rgba(118, 224, 184, 0.16)";
        traceSectionPolygon(profileCtx, ledSection.outer, projectPoint);
        profileCtx.fill();
        profileCtx.strokeStyle = "rgba(118, 224, 184, 0.95)";
        profileCtx.lineWidth = 1.8;
        traceSectionPolygon(profileCtx, ledSection.outer, projectPoint);
        profileCtx.stroke();
      }
      if (ledSection.inner.length >= 3) {
        profileCtx.strokeStyle = "rgba(92, 188, 255, 0.95)";
        profileCtx.lineWidth = 1.5;
        traceSectionPolygon(profileCtx, ledSection.inner, projectPoint);
        profileCtx.stroke();
      }
      const ledOuterProjected = ledSection.outer.map(projectPoint);
      const ledInnerProjected = ledSection.inner.map(projectPoint);
      if (ledOuterProjected.length >= 4) {
        const ledLengthStart = ledOuterProjected[0];
        const ledLengthEnd = ledOuterProjected[3];
        const ledLengthDimX = Math.max(...ledOuterProjected.map((pt) => pt.x)) + 24;
        profileCtx.save();
        profileCtx.strokeStyle = "rgba(118, 224, 184, 0.95)";
        profileCtx.fillStyle = "rgba(118, 224, 184, 0.95)";
        profileCtx.lineWidth = 1.4;
        profileCtx.beginPath();
        profileCtx.moveTo(ledLengthStart.x, ledLengthStart.y);
        profileCtx.lineTo(ledLengthDimX, ledLengthStart.y);
        profileCtx.moveTo(ledLengthEnd.x, ledLengthEnd.y);
        profileCtx.lineTo(ledLengthDimX, ledLengthEnd.y);
        profileCtx.moveTo(ledLengthDimX, ledLengthStart.y);
        profileCtx.lineTo(ledLengthDimX, ledLengthEnd.y);
        profileCtx.stroke();
        drawArrowHead(profileCtx, ledLengthDimX, ledLengthStart.y, 0, 1, 6);
        drawArrowHead(profileCtx, ledLengthDimX, ledLengthEnd.y, 0, -1, 6);
        profileCtx.restore();
        drawHandleLabel(
          profileCtx,
          `LED L ${Number(params.ledLen).toFixed(1)} mm`,
          ledLengthDimX + 14,
          0.5 * (ledLengthStart.y + ledLengthEnd.y),
          "center",
          -90
        );
      }
      if (ledInnerProjected.length >= 2) {
        const ledDiameterLeft = ledInnerProjected[0];
        const ledDiameterRight = ledInnerProjected[1];
        const ledDiameterDimY = Math.max(ledDiameterLeft.y, ledDiameterRight.y) + 26;
        profileCtx.save();
        profileCtx.strokeStyle = "rgba(92, 188, 255, 0.95)";
        profileCtx.fillStyle = "rgba(92, 188, 255, 0.95)";
        profileCtx.lineWidth = 1.4;
        profileCtx.beginPath();
        profileCtx.moveTo(ledDiameterLeft.x, ledDiameterLeft.y);
        profileCtx.lineTo(ledDiameterLeft.x, ledDiameterDimY);
        profileCtx.moveTo(ledDiameterRight.x, ledDiameterRight.y);
        profileCtx.lineTo(ledDiameterRight.x, ledDiameterDimY);
        profileCtx.moveTo(ledDiameterLeft.x, ledDiameterDimY);
        profileCtx.lineTo(ledDiameterRight.x, ledDiameterDimY);
        profileCtx.stroke();
        drawArrowHead(profileCtx, ledDiameterLeft.x, ledDiameterDimY, 1, 0, 6);
        drawArrowHead(profileCtx, ledDiameterRight.x, ledDiameterDimY, -1, 0, 6);
        profileCtx.restore();
        drawHandleLabel(
          profileCtx,
          `LED D ${Number(params.ledD).toFixed(1)} mm`,
          0.5 * (ledDiameterLeft.x + ledDiameterRight.x),
          ledDiameterDimY + 16,
          "center"
        );
      }

      const drainOverlay = buildDrainHoleSectionOverlay(params, bodyZ0, length, cavityResult.points);
      if (drainOverlay?.polygon?.length >= 3) {
        profileCtx.fillStyle = "rgba(255, 146, 102, 0.18)";
        traceSectionPolygon(profileCtx, drainOverlay.polygon, projectPoint);
        profileCtx.fill();
        profileCtx.strokeStyle = "rgba(255, 146, 102, 0.95)";
        profileCtx.lineWidth = 1.5;
        traceSectionPolygon(profileCtx, drainOverlay.polygon, projectPoint);
        profileCtx.stroke();
      }
      if (drainOverlay?.centerline?.length >= 2) {
        profileCtx.save();
        profileCtx.strokeStyle = "rgba(255, 196, 168, 0.95)";
        profileCtx.lineWidth = 1.1;
        profileCtx.setLineDash([6, 4]);
        traceSectionPolyline(profileCtx, drainOverlay.centerline, projectPoint);
        profileCtx.stroke();
        profileCtx.restore();

        const drainFoot = projectPoint(drainOverlay.centerline[0]);
        const drainTip = projectPoint(drainOverlay.centerline[1]);
        const drainLabelDx = drainTip.x >= drainFoot.x ? 38 : -38;
        drawHandleLabel(
          profileCtx,
          `${Math.round(Number(params.drainAngleDeg))} deg`,
          drainFoot.x + drainLabelDx,
          drainFoot.y + 16,
          "center"
        );
      }

      const handles = [];
      const mmPerPixel = 1.0 / scale;
      const knobRadius = 9;

      function registerHandle({
        id,
        x,
        y,
        axis,
        axisSign,
        input,
        sensitivity,
        cursor,
        color,
        label,
        labelDx = 0,
        labelDy = -18,
        labelRotationDeg = 0,
        dragMode,
        inputX,
        inputY,
        sensitivityX,
        sensitivityY,
        axisSignX,
        axisSignY
      }) {
        const handleOffset = getProfileHandleOffset(id);
        const handleX = x + handleOffset.x;
        const handleY = y + handleOffset.y;
        handles.push({
          id,
          x: handleX,
          y: handleY,
          defaultX: x,
          defaultY: y,
          radius: knobRadius,
          axis,
          axisSign,
          input,
          sensitivity,
          cursor: cursor || (axis === "x" ? "ew-resize" : (axis === "y" ? "ns-resize" : "move")),
          dragMode,
          inputX,
          inputY,
          sensitivityX,
          sensitivityY,
          axisSignX,
          axisSignY
        });

        drawDirectionIndicator(profileCtx, handleX, handleY, axis, color);

        profileCtx.save();
        profileCtx.fillStyle = color;
        profileCtx.strokeStyle = "rgba(10, 14, 18, 0.95)";
        profileCtx.lineWidth = 2;
        profileCtx.beginPath();
        profileCtx.arc(handleX, handleY, knobRadius, 0, Math.PI * 2);
        profileCtx.fill();
        profileCtx.stroke();
        profileCtx.restore();

        drawHandleLabel(profileCtx, label, handleX + labelDx, handleY + labelDy, "center", labelRotationDeg);
      }

      const outerRightTop = projectPoint({ x: maxX, y: maxY });
      const outerRightBottom = projectPoint({ x: maxX, y: minY });
      const lengthDimX = outerRightTop.x + 46;
      const lengthTop = { x: lengthDimX, y: outerRightTop.y };
      const lengthBottom = { x: lengthDimX, y: outerRightBottom.y };
      profileCtx.save();
      profileCtx.strokeStyle = "rgba(255, 209, 102, 0.95)";
      profileCtx.fillStyle = "rgba(255, 209, 102, 0.95)";
      profileCtx.lineWidth = 1.5;
      profileCtx.beginPath();
      profileCtx.moveTo(outerRightTop.x + 8, outerRightTop.y);
      profileCtx.lineTo(lengthTop.x, lengthTop.y);
      profileCtx.moveTo(outerRightBottom.x + 8, outerRightBottom.y);
      profileCtx.lineTo(lengthBottom.x, lengthBottom.y);
      profileCtx.moveTo(lengthTop.x, lengthTop.y);
