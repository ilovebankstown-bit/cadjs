<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Float Maker</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101215;
      --panel: #181c21;
      --panel-border: #2b323b;
      --canvas: #0f1318;
      --text: #e8eef5;
      --muted: #a6b2bf;
      --accent: #7ec6ff;
      --ok: #93d38a;
      --warn: #e5ba63;
      --err: #ef7b7b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      position: relative;
    }

    .panel {
      width: 250px;
      height: 100vh;
      padding: 16px;
      overflow-y: auto;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      font-size: 12px;
      transition: width 0.18s ease, padding 0.18s ease, border-right-color 0.18s ease;
    }

    .panel > * {
      transition: opacity 0.12s ease;
    }

    body.panel-collapsed .panel {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      border-right-color: transparent;
      overflow: hidden;
    }

    body.panel-collapsed .panel > * {
      opacity: 0;
      pointer-events: none;
    }

    #panelEdgeTrigger {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 14px;
      z-index: 30;
      background: transparent;
    }

    body:not(.panel-collapsed) #panelEdgeTrigger {
      width: 0;
      pointer-events: none;
    }

    .panel h1 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .panel p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--panel-border);
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .control {
      margin-bottom: 10px;
    }

    .control label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .label-value {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .control label[data-inline-value]::after {
      content: attr(data-inline-value);
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .control input,
    .control select {
      width: 100%;
      padding: 7px 8px;
      border: 1px solid #3a424d;
      background: #11161c;
      color: var(--text);
      font-size: 12px;
    }

    .control input[type="range"] {
      padding: 0;
    }

    .control-inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .check input {
      width: auto;
    }

    .value {
      display: none;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #3a424d;
      background: #232a33;
      color: var(--text);
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: #2a3440;
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .status {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 4;
      max-width: min(420px, calc(100% - 24px));
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(10, 14, 18, 0.9);
      font-size: 11px;
      line-height: 1.35;
      white-space: pre-wrap;
      pointer-events: auto;
    }

    .status .status-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }

    .workspace {
      flex: 1;
      min-width: 0;
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 40%) minmax(420px, 60%);
      gap: 0;
    }

    .pane {
      position: relative;
      min-width: 0;
      height: 100%;
      border-left: 1px solid var(--panel-border);
      background: var(--canvas);
    }

    .pane:first-child {
      border-left: 0;
    }

    .pane-title {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 6px 9px;
      background: rgba(10, 14, 18, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      color: var(--muted);
      pointer-events: none;
    }

    .viewport-controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      padding: 6px 8px;
      background: rgba(10, 14, 18, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .viewport-stage {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      padding: 6px 9px;
      background: rgba(10, 14, 18, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 11px;
      color: var(--text);
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    .viewport-toggle {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      width: 100%;
      padding: 0;
      background: transparent;
      border: 0;
      font-size: 11px;
      color: var(--muted);
      user-select: none;
      text-align: right;
    }

    .viewport-toggle input {
      width: auto;
      margin: 0;
    }

    .viewport-toggle select {
      width: 100%;
      min-width: 96px;
      padding: 3px 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(18, 24, 31, 0.95);
      color: var(--text);
      font-size: 11px;
      text-align: left;
    }

    #profileCanvas,
    #viewport {
      width: 100%;
      height: 100%;
      display: block;
    }

    #profileCanvas {
      background:
        linear-gradient(transparent 24px, rgba(255,255,255,0.04) 25px),
        linear-gradient(90deg, transparent 24px, rgba(255,255,255,0.04) 25px),
        #121821;
      background-size: 25px 25px, 25px 25px, auto;
    }

    #viewport canvas {
      display: block;
    }

    .metrics {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--panel-border);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .metrics code {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Custom Float Maker</h1>


    <div class="section">
      <h2>Profile Preset</h2>
      <div class="control">
        <select id="preset">
          <option value="custom">Custom</option>
          <option value="circle">Circle</option>
          <option value="ellipse">Ellipse</option>
          <option value="egg">Egg</option>
          <option value="cigar">Cigar</option>
          <option value="teardrop">Teardrop</option>
          <option value="tictac">Tic-tac</option>
        </select>
      </div>

      <div class="control">
        <label for="length">
          <span>Profile Length</span>
          <span class="label-value" id="lengthVal"></span>
        </label>
        <input id="length" type="range" min="10" max="500" value="216.67" />
      </div>

      <div class="control" hidden>
        <label for="thickness">
          <span>Profile Thickness</span>
          <span class="label-value" id="thicknessVal"></span>
        </label>
        <input id="thickness" type="range" min="40" max="220" step="0.1" value="100" />
      </div>

      <div class="control">
        <label for="p">
          <span>Roundness p</span>
          <span class="label-value" id="pVal"></span>
        </label>
        <input id="p" type="range" min="0.6" max="10" step="0.01" value="2" />
      </div>

      <div class="control">
        <label for="q">
          <span>End Taper q</span>
          <span class="label-value" id="qVal"></span>
        </label>
        <input id="q" type="range" min="0.6" max="10" step="0.01" value="2" />
      </div>

      <div class="control">
        <label for="alpha">Asymmetry α</label>
        <input id="alpha" type="range" min="-0.9" max="0.9" step="0.01" value="0" />
        <div class="value" id="alphaVal"></div>
      </div>

      <div class="control">
        <label for="beta">Bulge β</label>
        <input id="beta" type="range" min="-0.9" max="5" step="0.01" value="0" />
        <div class="value" id="betaVal"></div>
      </div>
    </div>

    <div class="section">
      <h2>Float</h2>
      <div class="control">
        <label for="buoyancy">Buoyancy (g)</label>
        <input id="buoyancy" type="number" min="1" max="99" step="1" value="20" />
      </div>

      <div class="control-inline">
        <div class="control">
          <label for="wallThickness">Shell Thickness</label>
          <input id="wallThickness" type="number" min="0.2" step="0.1" value="0.8" />
        </div>
        <div class="control">
          <label for="bore">Bore (mm)</label>
          <input id="bore" type="number" min="0.5" step="0.1" value="2.5" />
        </div>
      </div>

      <div class="control-inline">
        <div class="control">
          <label for="ledD">LED D (mm)</label>
          <input id="ledD" type="number" min="1" step="0.1" value="6" />
        </div>
        <div class="control">
          <label for="ledLen">LED L (mm)</label>
          <input id="ledLen" type="number" min="1" step="0.1" value="18" />
        </div>
      </div>

      <div class="control-inline">
        <div class="control">
          <label for="tripodAttachZ">Tripod Z1 (mm)</label>
          <input id="tripodAttachZ" type="number" min="1" step="0.5" value="10" />
        </div>
        <div class="control">
          <label for="tripodAttachZ2">Tripod Z2 (mm)</label>
          <input id="tripodAttachZ2" type="number" min="0" step="0.5" value="0" />
        </div>
      </div>

      <div class="control-inline">
        <div class="control">
          <label for="legThickness">Tripod Square</label>
          <input id="legThickness" type="number" min="0.2" step="0.1" value="1.6" />
        </div>
        <div class="control">
          <label for="tripodOffsetDeg">Offset (deg)</label>
          <input id="tripodOffsetDeg" type="number" min="0" max="360" step="1" value="60" />
        </div>
        
      </div>

      <div class="control-inline">
        <div class="control">
          <label for="baseThickness">Base Thickness</label>
          <input id="baseThickness" type="number" min="0.2" step="0.1" value="1.2" />
        </div>
        <div class="control">
          <label for="floatBaseGap">Base Gap (mm)</label>
          <input id="floatBaseGap" type="number" min="0" step="0.1" value="1.0" />
        </div>
      </div>

      <div class="control">
        <label for="baseRadiusFactor">Base Radius Factor</label>
        <input id="baseRadiusFactor" type="number" min="0.05" step="0.01" value="0.3" />
      </div>

      <div class="control-inline">
        <div class="control">
          <label for="drainAngle">Drain Angle (deg)</label>
          <input id="drainAngle" type="number" min="1" max="89" step="1" value="35" />
        </div>
        <div class="control">
          <label for="drainDiameter">Drain D (mm)</label>
          <input id="drainDiameter" type="number" min="0.2" step="0.1" value="2.5" />
        </div>
      </div>

      <div class="control-inline">
        <div class="control">
          <label for="postBaseFillet">Base Fillet (mm)</label>
          <input id="postBaseFillet" type="number" step="0.1" value="1" />
        </div>
        <div class="control">
          <label for="postTailFillet">Tail Fillet (mm)</label>
          <input id="postTailFillet" type="number" step="0.1" value="2" />
        </div>
      </div>

      <label class="check">
        <input id="noBase" type="checkbox" />
        <span>No base / support</span>
      </label>

      <label class="check">
        <input id="invertBase" type="checkbox" />
        <span>Invert base + tripod</span>
      </label>

      <label class="check">
        <input id="noDrain" type="checkbox" />
        <span>No drain hole</span>
      </label>
    </div>

    <div class="btn-row">
      <button id="saveBtn">Save JSON</button>
      <button id="loadBtn">Load JSON</button>
      <input id="loadInput" type="file" accept="application/json,.json" style="display:none" />
    </div>

    <div class="btn-row">
      <button id="generateBtn">Generate CAD</button>
      <button id="exportStepBtn" disabled>Export STEP</button>
    </div>

    <div class="btn-row">
      <button id="exportStlBtn" disabled>Export STL</button>
      <button id="fitBtn">Fit View</button>
    </div>

    <div class="status" id="status">Loading OpenCascade.js…</div>

    <div class="metrics" id="metrics">
      No model yet.
    </div>
  </div>

  <div id="panelEdgeTrigger" aria-hidden="true"></div>

  <div class="workspace">
    <div class="pane">
      <div class="pane-title">2D Profile</div>
      <canvas id="profileCanvas" width="900" height="700"></canvas>
    </div>
    <div class="pane">
      <div class="viewport-stage" id="viewportStage">Stage: Not built</div>
      <div class="viewport-controls">
        <label class="viewport-toggle">
          <span>Cut Box</span>
          <input id="clipBoxEdit" type="checkbox" />
        </label>
        <label class="viewport-toggle">
          <span>Transparent</span>
          <input id="transparentView" type="checkbox" checked />
        </label>
        <div class="viewport-toggle">
          <select id="materialPreset">
            <option value="plastic">◌ Plastic</option>
            <option value="steel">⬡ Steel</option>
            <option value="brass">✦ Brass</option>
            <option value="graphite">◆ Graphite</option>
            <option value="clay">◒ Clay</option>
          </select>
        </div>
        <div class="viewport-toggle">
          <select id="colorPreset">
            <option value="default">◻ Default</option>
            <option value="white">⚪ White</option>
            <option value="gray">🔘 Gray</option>
            <option value="black">⚫ Black</option>
            <option value="red">🟥 Red</option>
            <option value="green">🟩 Green</option>
            <option value="blue">🟦 Blue</option>
            <option value="yellow">🟨 Yellow</option>
            <option value="orange">🟧 Orange</option>
          </select>
        </div>
      </div>
      <div id="viewport"></div>
    </div>
  </div>

  <script type="module">
    import ocFactory from "./vendor/opencascade/opencascade.loader.mjs";
    import * as THREE from "./vendor/three/three.module.js";
    import { OrbitControls } from "./vendor/three/examples/jsm/controls/OrbitControls.local.js";

    const OCCT_BASE_URL = "./vendor/opencascade/";
    const PROFILE_SAMPLES = 296;
    const LOFT_SECTION_COUNT = 48;
    const CIRCLE_SEGMENTS = 32;
    const DEFAULT_LINEAR_DEFLECTION = 0.35;
    const DEFAULT_ANGULAR_DEFLECTION = 0.5;
    const AUTO_GENERATE_CAD = false;
    const SOLID_VIEW_OPACITY = 0.45;
    const STEP_PREVIEW_DELAY_MS = 120;
    const BROWSER_STORAGE_KEY = "customfloatmaker.browser_state.v1";
    const FIXED_PROFILE_THICKNESS = 100.0;
    const LED_SLEEVE_END_CUT_DEG = 45.0;
    const PREVIEW_MATERIALS = {
      plastic: { color: 0xd8dde6, metalness: 0.05, roughness: 0.55, emissive: 0x000000, emissiveIntensity: 0.0 },
      steel: { color: 0xc3ced9, metalness: 0.84, roughness: 0.28, emissive: 0x000000, emissiveIntensity: 0.0 },
      brass: { color: 0xc4a051, metalness: 0.9, roughness: 0.34, emissive: 0x231608, emissiveIntensity: 0.03 },
      graphite: { color: 0x56606a, metalness: 0.22, roughness: 0.86, emissive: 0x000000, emissiveIntensity: 0.0 },
      clay: { color: 0xc88863, metalness: 0.02, roughness: 0.94, emissive: 0x1d1008, emissiveIntensity: 0.02 }
    };
    const PREVIEW_COLORS = {
      default: null,
      white: 0xf2f4f7,
      gray: 0x9aa3ad,
      black: 0x22272e,
      red: 0xc74b4b,
      green: 0x56a66a,
      blue: 0x4d83d1,
      yellow: 0xd0b347,
      orange: 0xc98642
    };
    const SECTION_STAGE_MATERIAL = {
      color: 0xaedfff,
      metalness: 0.05,
      roughness: 0.55,
      emissive: 0x000000,
      emissiveIntensity: 0.0
    };

    const profileCanvas = document.getElementById("profileCanvas");
    const profileCtx = profileCanvas.getContext("2d");
    const viewport = document.getElementById("viewport");

    const ui = {
      preset: document.getElementById("preset"),
      length: document.getElementById("length"),
      thickness: document.getElementById("thickness"),
      p: document.getElementById("p"),
      q: document.getElementById("q"),
      alpha: document.getElementById("alpha"),
      beta: document.getElementById("beta"),
      buoyancy: document.getElementById("buoyancy"),
      wallThickness: document.getElementById("wallThickness"),
      bore: document.getElementById("bore"),
      ledD: document.getElementById("ledD"),
      ledLen: document.getElementById("ledLen"),
      tripodAttachZ: document.getElementById("tripodAttachZ"),
      tripodAttachZ2: document.getElementById("tripodAttachZ2"),
      tripodOffsetDeg: document.getElementById("tripodOffsetDeg"),
      legThickness: document.getElementById("legThickness"),
      baseThickness: document.getElementById("baseThickness"),
      floatBaseGap: document.getElementById("floatBaseGap"),
      baseRadiusFactor: document.getElementById("baseRadiusFactor"),
      drainAngle: document.getElementById("drainAngle"),
      drainDiameter: document.getElementById("drainDiameter"),
      postBaseFillet: document.getElementById("postBaseFillet"),
      postTailFillet: document.getElementById("postTailFillet"),
      noBase: document.getElementById("noBase"),
      invertBase: document.getElementById("invertBase"),
      noDrain: document.getElementById("noDrain"),
      saveBtn: document.getElementById("saveBtn"),
      loadBtn: document.getElementById("loadBtn"),
      loadInput: document.getElementById("loadInput"),
      generateBtn: document.getElementById("generateBtn"),
      exportStepBtn: document.getElementById("exportStepBtn"),
      exportStlBtn: document.getElementById("exportStlBtn"),
      fitBtn: document.getElementById("fitBtn"),
      clipBoxEdit: document.getElementById("clipBoxEdit"),
      materialPreset: document.getElementById("materialPreset"),
      colorPreset: document.getElementById("colorPreset"),
      transparentView: document.getElementById("transparentView"),
      viewportStage: document.getElementById("viewportStage"),
      status: document.getElementById("status"),
      metrics: document.getElementById("metrics"),
      lengthVal: document.getElementById("lengthVal"),
      thicknessVal: document.getElementById("thicknessVal"),
      pVal: document.getElementById("pVal"),
      qVal: document.getElementById("qVal"),
      alphaVal: document.getElementById("alphaVal"),
      betaVal: document.getElementById("betaVal")
    };

    const panel = document.querySelector(".panel");
    const panelEdgeTrigger = document.getElementById("panelEdgeTrigger");
    const PANEL_EDGE_TRIGGER_PX = 14;
    const PANEL_HIDE_MARGIN_PX = 24;
    const PANEL_HIDE_DELAY_MS = 140;
    let panelHideTimer = null;

    const state = {
      oc: null,
      cadWorker: null,
      scene: null,
      camera: null,
      renderer: null,
      controls: null,
      currentShape: null,
      currentMesh: null,
      currentMetrics: null,
      currentOverlay: null,
      buildTimer: null,
      ocReady: false,
      workerReady: false,
      buildVersion: 0,
      workerRequestSeq: 0,
      pendingStepExports: new Map(),
      pendingStlExports: new Map(),
      fitViewOnNextBuildStage: false,
      renderQueue: Promise.resolve(),
      sectionBoxGroup: null,
      sectionCapGroup: null,
      sectionCaps: [],
      sectionBoxWire: null,
      sectionHandles: [],
      sectionBoxOriginal: null,
      sectionBoxCurrent: null,
      sectionPlanes: [],
      dragHandle: null,
      orbitDragging: false,
      profileFilletInteraction: null,
      profileFilletDrag: null,
      profileHandleOffsets: {},
      autosaveTimer: null,
      pendingViewportState: null,
      restoreViewportOnNextRender: false,
      raycaster: new THREE.Raycaster(),
      pointerNdc: new THREE.Vector2()
    };

    function setPanelCollapsed(collapsed) {
      document.body.classList.toggle("panel-collapsed", !!collapsed);
    }

    function showPanel() {
      if (panelHideTimer) {
        clearTimeout(panelHideTimer);
        panelHideTimer = null;
      }
      setPanelCollapsed(false);
    }

    function hidePanelSoon(delayMs = PANEL_HIDE_DELAY_MS) {
      if (!panel) {
        return;
      }
      if (panelHideTimer) {
        clearTimeout(panelHideTimer);
      }
      panelHideTimer = setTimeout(() => {
        panelHideTimer = null;
        if (!panel.matches(":hover")) {
          setPanelCollapsed(true);
        }
      }, Math.max(0, delayMs));
    }

    function updatePanelAutoHideFromPointer(event) {
      if (!panel) {
        return;
      }
      if (event.pointerType && event.pointerType !== "mouse") {
        return;
      }
      if (event.buttons && event.buttons !== 0) {
        return;
      }
      const pointerX = Number(event.clientX);
      if (!Number.isFinite(pointerX)) {
        return;
      }
      if (pointerX <= PANEL_EDGE_TRIGGER_PX) {
        showPanel();
        return;
      }
      if (document.body.classList.contains("panel-collapsed") || panel.matches(":hover")) {
        return;
      }
      const panelRect = panel.getBoundingClientRect();
      if (pointerX > panelRect.right + PANEL_HIDE_MARGIN_PX) {
        hidePanelSoon();
      }
    }

    function initPanelAutoHide() {
      if (!panel) {
        return;
      }
      setPanelCollapsed(true);
      panel.addEventListener("pointerenter", showPanel);
      panel.addEventListener("pointerleave", (event) => {
        if (event.pointerType && event.pointerType !== "mouse") {
          return;
        }
        hidePanelSoon();
      });
      panelEdgeTrigger?.addEventListener("pointerenter", showPanel);
      panelEdgeTrigger?.addEventListener("pointermove", showPanel);
      window.addEventListener("pointermove", updatePanelAutoHideFromPointer, { passive: true });
    }

    initPanelAutoHide();

    (function placeStatusOverlayInProfilePane() {
      const profilePane = profileCanvas.closest(".pane");
      if (!profilePane || !ui.status) {
        return;
      }
      if (ui.status.parentElement !== profilePane) {
        profilePane.appendChild(ui.status);
      }
    })();

    function setStatus(message, tone = "normal") {
      const text = String(message ?? "");
      ui.status.replaceChildren();

      function appendStatusLink(label, onClick) {
        const link = document.createElement("a");
        link.href = "#";
        link.className = "status-link";
        link.textContent = label;
        link.addEventListener("click", (event) => {
          event.preventDefault();
          onClick();
        });
        ui.status.appendChild(link);
      }

      const generateActionText = "Click Generate CAD";
      const exportActionText = "Click to export STL or STEP";
      const generateActionIndex = text.indexOf(generateActionText);
      const exportActionIndex = text.indexOf(exportActionText);

      if (generateActionIndex >= 0) {
        const before = text.slice(0, generateActionIndex);
        const after = text.slice(generateActionIndex + generateActionText.length);
        if (before) {
          ui.status.appendChild(document.createTextNode(before));
        }
        appendStatusLink(generateActionText, () => {
          if (!ui.generateBtn.disabled) {
            ui.generateBtn.click();
          }
        });
        if (after) {
          ui.status.appendChild(document.createTextNode(after));
        }
      } else if (exportActionIndex >= 0) {
        const before = text.slice(0, exportActionIndex);
        const after = text.slice(exportActionIndex + exportActionText.length);
        if (before) {
          ui.status.appendChild(document.createTextNode(before));
        }
        ui.status.appendChild(document.createTextNode("Click to export "));
        appendStatusLink("STL", () => {
          if (!ui.exportStlBtn.disabled) {
            ui.exportStlBtn.click();
          }
        });
        ui.status.appendChild(document.createTextNode(" or "));
        appendStatusLink("STEP", () => {
          if (!ui.exportStepBtn.disabled) {
            ui.exportStepBtn.click();
          }
        });
        if (after) {
          ui.status.appendChild(document.createTextNode(after));
        }
      } else {
        ui.status.textContent = text;
      }
      ui.status.style.color =
        tone === "ok" ? "var(--ok)"
        : tone === "warn" ? "var(--warn)"
        : tone === "err" ? "var(--err)"
        : "var(--text)";
    }

    function waitForBrowserPaint() {
      return new Promise((resolve) => {
        requestAnimationFrame(() => {
          setTimeout(resolve, 0);
        });
      });
    }

    async function yieldToBrowser(message = null, tone = "normal") {
      if (message) {
        setStatus(message, tone);
      }
      await waitForBrowserPaint();
    }

    function markModelDirty(reason = "changed") {
      if (state.buildTimer) {
        clearTimeout(state.buildTimer);
        state.buildTimer = null;
      }
      state.buildVersion += 1;
      if (state.cadWorker && state.workerReady) {
        state.cadWorker.postMessage({ type: "invalidate-build", buildVersion: state.buildVersion });
      }
      state.currentShape = null;
      state.currentMetrics = null;
      ui.generateBtn.disabled = false;
      ui.exportStepBtn.disabled = true;
      ui.exportStlBtn.disabled = true;
      const message = reason === "initial"
        ? "CAD worker ready. Click Generate CAD."
        : "Parameters changed. Click Generate CAD.";
      setStatus(message, "warn");
    }

    function callFirstAvailable(target, names, args = []) {
      for (const name of names) {
        if (typeof target[name] === "function") {
          return target[name](...args);
        }
      }
      throw new Error(`Missing method: ${names.join(" / ")}`);
    }

    function instantiateAvailable(openCascade, names, args = []) {
      for (const name of names) {
        const Ctor = openCascade[name];
        if (typeof Ctor === "function") {
          return new Ctor(...args);
        }
      }
      throw new Error(`Missing constructor: ${names.join(" / ")}`);
    }

    function callFunctionVariants(fn, variants) {
      const errors = [];
      for (const args of variants) {
        try {
          return fn(...args);
        } catch (err) {
          errors.push(`${args.length} args: ${err.message}`);
        }
      }
      throw new Error(`No working overload. Tried: ${errors.join(" | ")}`);
    }

    function instantiateAvailableVariants(openCascade, variants) {
      const errors = [];
      for (const variant of variants) {
        const names = variant.names || [];
        const args = variant.args || [];
        for (const name of names) {
          const Ctor = openCascade[name];
          if (typeof Ctor !== "function") continue;
          try {
            return new Ctor(...args);
          } catch (err) {
            errors.push(`${name}: ${err.message}`);
          }
        }
      }
      throw new Error(`Missing working constructor variant. Tried: ${errors.join(" | ")}`);
    }

    function callFirstAvailableVariant(target, variants) {
      const errors = [];
      for (const variant of variants) {
        const names = variant.names || [];
        const args = variant.args || [];
        for (const name of names) {
          if (typeof target[name] !== "function") continue;
          try {
            return target[name](...args);
          } catch (err) {
            errors.push(`${name}: ${err.message}`);
          }
        }
      }
      throw new Error(`Missing working method variant. Tried: ${errors.join(" | ")}`);
    }

    async function initOpenCascadeJs() {
      if (location.protocol === "file:") {
        throw new Error(
          "Open this page through http://localhost, not file://. Run serve_customfloatmaker.py and open the printed URL."
        );
      }
      return ocFactory({
        locateFile(file) {
          return `${OCCT_BASE_URL}${file}`;
        }
      });
    }

    function buildGeometryFromPayload(payload) {
      const geometry = new THREE.BufferGeometry();
      const positions = payload.positions instanceof Float32Array ? payload.positions : new Float32Array(payload.positions || []);
      const normals = payload.normals instanceof Float32Array ? payload.normals : new Float32Array(payload.normals || []);
      const indices = payload.indices instanceof Uint32Array ? payload.indices : new Uint32Array(payload.indices || []);
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("normal", new THREE.BufferAttribute(normals, 3));
      geometry.setIndex(new THREE.BufferAttribute(indices, 1));
      geometry.computeBoundingBox();
      geometry.computeBoundingSphere();
      return geometry;
    }

    async function renderCurrentGeometryPayload(payload, metrics, options = {}) {
      const hadMesh = Boolean(state.currentMesh);
      const liveSectionBoxBounds = hadMesh ? serializeSectionBoxBounds(state.sectionBoxCurrent) : null;
      const pendingViewport = state.pendingViewportState;
      const isFinal = (options.final !== undefined ? options.final : true) && metrics?.buildStage !== "2D Section";
      disposeCurrentMesh();
      const geometry = buildGeometryFromPayload(payload);
      const isSectionStage = metrics?.buildStage === "2D Section";
      const material = createPreviewMeshMaterial(isSectionStage);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.rotation.x = -Math.PI / 2;
      state.scene.add(mesh);
      state.currentMesh = mesh;
      if (isSectionStage) {
        const edgeLines = new THREE.LineSegments(
          new THREE.EdgesGeometry(geometry),
          new THREE.LineBasicMaterial({
            color: 0x1b2b38,
            depthTest: false,
            transparent: false
          })
        );
        edgeLines.rotation.copy(mesh.rotation);
        edgeLines.renderOrder = 10;
        state.scene.add(edgeLines);
        state.currentOverlay = edgeLines;
      }
      state.currentMetrics = metrics;
      applyMeshTransparency();
      const fitCamera = options.fitCamera !== undefined
        ? options.fitCamera
        : (!hadMesh && !state.restoreViewportOnNextRender && isFinal);
      if (fitCamera) {
        fitCameraToCurrentMesh(isSectionStage ? "front" : "auto");
      }
      if (isSectionStage) {
        disposeSectionBox();
      } else {
        buildSectionBoxForMesh(mesh);
        if (liveSectionBoxBounds) {
          applySavedSectionBoxBounds(liveSectionBoxBounds);
        } else if (pendingViewport && isFinal) {
          state.pendingViewportState = pendingViewport;
          applyPendingViewportStateToCurrentMesh();
          if (pendingViewport.clipBoxEdit !== undefined) {
            setSectionEditMode(!!pendingViewport.clipBoxEdit);
          }
        }
      }
      state.restoreViewportOnNextRender = false;
      ui.exportStepBtn.disabled = !isFinal;
      ui.exportStlBtn.disabled = !isFinal;
      renderMetrics(metrics);
    }

    async function handleCadWorkerMessage(event) {
      const message = event.data || {};

      if (message.type === "ready") {
        state.workerReady = true;
        state.ocReady = true;
        setStatus("CAD worker ready. Click Generate CAD.", "ok");
        scheduleBuild("initial");
        return;
      }

      if (message.type === "progress") {
        if (message.jobId == null || message.jobId === state.buildVersion) {
          setStatus(message.message, message.tone || "normal");
        }
        return;
      }

      if (message.type === "stage") {
        if (message.jobId !== state.buildVersion) {
          return;
        }
        const fitCamera = state.fitViewOnNextBuildStage;
        state.fitViewOnNextBuildStage = false;
        state.renderQueue = state.renderQueue.then(() => renderCurrentGeometryPayload(message.geometry, message.metrics, {
          final: false,
          fitCamera
        }));
        await state.renderQueue;
        return;
      }

      if (message.type === "done") {
        if (message.jobId !== state.buildVersion) {
          return;
        }
        state.renderQueue = state.renderQueue.then(() => renderCurrentGeometryPayload(message.geometry, message.metrics, {
          final: true,
          fitCamera: false
        }));
        await state.renderQueue;
        ui.generateBtn.disabled = false;
        setStatus(
          `Model ready.\nClick to export STL or STEP. \nLength ${message.metrics.length.toFixed(2)} mm, diameter ${message.metrics.diameter.toFixed(2)} mm.`,
          "ok"
        );
        return;
      }

      if (message.type === "step-export") {
        const pending = state.pendingStepExports.get(message.requestId);
        if (!pending) {
          return;
        }
        state.pendingStepExports.delete(message.requestId);
        pending.resolve(message.data instanceof Uint8Array ? message.data : new Uint8Array(message.data));
        return;
      }

      if (message.type === "stl-export") {
        const pending = state.pendingStlExports.get(message.requestId);
        if (!pending) {
          return;
        }
        state.pendingStlExports.delete(message.requestId);
        pending.resolve(message.data instanceof Uint8Array ? message.data : new Uint8Array(message.data));
        return;
      }

      if (message.type === "error") {
        if (message.requestId != null) {
          const pendingStep = state.pendingStepExports.get(message.requestId);
          if (pendingStep) {
            state.pendingStepExports.delete(message.requestId);
            pendingStep.reject(new Error(message.message));
          }
          const pendingStl = state.pendingStlExports.get(message.requestId);
          if (pendingStl) {
            state.pendingStlExports.delete(message.requestId);
            pendingStl.reject(new Error(message.message));
          }
        }
        if (message.jobId == null || message.jobId === state.buildVersion) {
          console.error(message.stack || message.message);
          state.fitViewOnNextBuildStage = false;
          ui.generateBtn.disabled = false;
          setStatus(`CAD build failed: ${message.message}`, "err");
        }
      }
    }

    function initCadWorker() {
      if (location.protocol === "file:") {
        throw new Error(
          "Open this page through http://localhost, not file://. Run serve_customfloatmaker.py and open the printed URL."
        );
      }
      if (state.cadWorker) {
        return;
      }
      const worker = new Worker(new URL("./customfloatmaker.worker.js", import.meta.url), { type: "module" });
      worker.addEventListener("message", (event) => {
        void handleCadWorkerMessage(event);
      });
      worker.addEventListener("error", (event) => {
        console.error(event.error || event.message);
        setStatus(`CAD worker failed: ${event.message || event.error?.message || "Unknown error"}`, "err");
        ui.generateBtn.disabled = false;
      });
      state.cadWorker = worker;
      worker.postMessage({ type: "init" });
    }

    function setupViewport() {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1218);

      const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 5000);
      camera.position.set(120, 90, 140);

      const renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.localClippingEnabled = true;
      viewport.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.55);
      scene.add(ambient);

      const key = new THREE.DirectionalLight(0xffffff, 0.85);
      key.position.set(1.5, 1.2, 1.0);
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x9fd3ff, 0.35);
      fill.position.set(-1.0, 0.5, -0.8);
      scene.add(fill);

      const grid = new THREE.GridHelper(240, 24, 0x2f3b4b, 0x202833);
      scene.add(grid);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.target.set(0, 35, 0);
      controls.addEventListener("change", () => {
        scheduleBrowserStateSave();
      });
      controls.addEventListener("start", () => {
        state.orbitDragging = true;
        updateViewportCursor();
      });
      controls.addEventListener("end", () => {
        state.orbitDragging = false;
        updateViewportCursor();
      });

      state.scene = scene;
      state.camera = camera;
      state.renderer = renderer;
      state.controls = controls;

      renderer.domElement.addEventListener("pointerdown", onViewportPointerDown, { capture: true });
      renderer.domElement.addEventListener("pointermove", onViewportPointerMove);
      renderer.domElement.addEventListener("pointerup", onViewportPointerUp);
      renderer.domElement.addEventListener("pointerleave", onViewportPointerUp);
      renderer.domElement.addEventListener("dblclick", onViewportDoubleClick);
      updateViewportCursor();

      function resize() {
        const width = Math.max(320, viewport.clientWidth);
        const height = Math.max(320, viewport.clientHeight);
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      resize();
      animate();
      window.addEventListener("resize", resize);
    }

    function updatePointerNdc(event) {
      const rect = state.renderer.domElement.getBoundingClientRect();
      state.pointerNdc.x = ((event.clientX - rect.left) / rect.width) * 2.0 - 1.0;
      state.pointerNdc.y = -((event.clientY - rect.top) / rect.height) * 2.0 + 1.0;
    }

    function localAxisVector(axis, sign = 1.0) {
      if (axis === "x") return new THREE.Vector3(sign, 0, 0);
      if (axis === "y") return new THREE.Vector3(0, sign, 0);
      return new THREE.Vector3(0, 0, sign);
    }

    function sectionBoxBoundsCopy(source) {
      return {
        min: source.min.clone(),
        max: source.max.clone()
      };
    }

    function setSectionEditMode(enabled) {
      if (state.dragHandle && !enabled) {
        state.renderer?.domElement.releasePointerCapture?.(state.dragHandle.pointerId);
        state.dragHandle = null;
      }
      if (state.controls) {
        state.controls.enabled = !state.dragHandle;
      }
      updateViewportCursor();
      if (state.sectionBoxWire) {
        state.sectionBoxWire.visible = enabled;
      }
      for (const handle of state.sectionHandles) {
        handle.visible = enabled;
      }
    }

    function getSectionHandleCursor(handleLike) {
      const axis = handleLike?.userData?.axis || handleLike?.axis || null;
      if (axis === "x") return "ew-resize";
      if (axis === "y") return "ns-resize";
      if (axis === "z") return "nwse-resize";
      return "default";
    }

    function getSectionHandleAtPointer(event) {
      if (!ui.clipBoxEdit?.checked || !state.currentMesh || !state.sectionHandles.length || !state.camera) {
        return null;
      }
      updatePointerNdc(event);
      state.raycaster.setFromCamera(state.pointerNdc, state.camera);
      const hits = state.raycaster.intersectObjects(state.sectionHandles, false);
      return hits.length ? hits[0].object : null;
    }

    function setSectionHandleHover(hoveredHandle = null) {
      for (const handle of state.sectionHandles) {
        if (!handle?.material) continue;
        const isHovered = handle === hoveredHandle;
        handle.material.color.setHex(isHovered ? 0xff7a1a : 0xe5ba63);
        handle.material.opacity = isHovered ? 0.95 : 0.45;
        handle.material.needsUpdate = true;
      }
    }

    function updateViewportCursor(event = null) {
      if (!state.renderer) {
        return;
      }

      if (state.dragHandle) {
        const draggedMesh = state.sectionHandles.find(
          (handle) =>
            handle.userData?.axis === state.dragHandle.axis &&
            handle.userData?.sign === state.dragHandle.sign
        ) || null;

        setSectionHandleHover(draggedMesh);
        state.renderer.domElement.style.cursor = getSectionHandleCursor(state.dragHandle);
        return;
      }

      if (ui.clipBoxEdit?.checked) {
        const hoveredHandle = event ? getSectionHandleAtPointer(event) : null;
        setSectionHandleHover(hoveredHandle);
        state.renderer.domElement.style.cursor = hoveredHandle
          ? getSectionHandleCursor(hoveredHandle)
          : (state.orbitDragging ? "grabbing" : "grab");
        return;
      }

      setSectionHandleHover(null);
      state.renderer.domElement.style.cursor = state.orbitDragging ? "grabbing" : "grab";
    }

    function getPreviewMaterialKey() {
      const key = ui.materialPreset?.value || "plastic";
      return PREVIEW_MATERIALS[key] ? key : "plastic";
    }

    function getPreviewColorKey() {
      const key = ui.colorPreset?.value || "default";
      return Object.prototype.hasOwnProperty.call(PREVIEW_COLORS, key) ? key : "default";
    }

    function getPreviewMaterialConfig(isSectionStage = false) {
      return isSectionStage ? SECTION_STAGE_MATERIAL : PREVIEW_MATERIALS[getPreviewMaterialKey()];
    }

    function applyPreviewMaterialConfig(material, isSectionStage = false) {
      if (!material) {
        return;
      }
      const config = getPreviewMaterialConfig(isSectionStage);
      const overrideColor = !isSectionStage ? PREVIEW_COLORS[getPreviewColorKey()] : null;
      material.color.setHex(overrideColor ?? config.color);
      material.metalness = config.metalness;
      material.roughness = config.roughness;
      if (material.emissive) {
        material.emissive.setHex(config.emissive || 0x000000);
        material.emissiveIntensity = config.emissiveIntensity || 0.0;
      }
      material.side = THREE.DoubleSide;
      material.needsUpdate = true;
    }

    function createPreviewMeshMaterial(isSectionStage = false) {
      const material = new THREE.MeshStandardMaterial({
        side: THREE.DoubleSide
      });
      applyPreviewMaterialConfig(material, isSectionStage);
      material.transparent = !isSectionStage;
      material.opacity = isSectionStage ? 0.95 : SOLID_VIEW_OPACITY;
      return material;
    }

    function applyCurrentPreviewMaterial() {
      const isSectionStage = state.currentMetrics?.buildStage === "2D Section";
      if (state.currentMesh?.material) {
        applyPreviewMaterialConfig(state.currentMesh.material, isSectionStage);
      }
      for (const cap of state.sectionCaps) {
        if (!cap.capMesh?.material) continue;
        applyPreviewMaterialConfig(cap.capMesh.material, false);
      }
      applyMeshTransparency();
    }

    function applyMeshTransparency() {
      const transparent = !!ui.transparentView?.checked;
      if (state.currentMesh?.material) {
        state.currentMesh.material.transparent = transparent;
        state.currentMesh.material.opacity = transparent ? SOLID_VIEW_OPACITY : 1.0;
        state.currentMesh.material.depthWrite = !transparent;
        state.currentMesh.material.needsUpdate = true;
      }
      for (const cap of state.sectionCaps) {
        if (!cap.capMesh?.material) continue;
        cap.capMesh.material.transparent = transparent;
        cap.capMesh.material.opacity = transparent ? SOLID_VIEW_OPACITY : 1.0;
        cap.capMesh.material.depthWrite = !transparent;
        cap.capMesh.material.needsUpdate = true;
      }
    }

    function buildLocalSectionPlaneSpecs(box) {
      return [
        {
          axis: "x",
          sign: -1,
          localPlane: new THREE.Plane(new THREE.Vector3(1, 0, 0), -box.min.x),
          localNormal: new THREE.Vector3(1, 0, 0),
          localPoint: new THREE.Vector3(box.min.x, 0, 0)
        },
        {
          axis: "x",
          sign: 1,
          localPlane: new THREE.Plane(new THREE.Vector3(-1, 0, 0), box.max.x),
          localNormal: new THREE.Vector3(-1, 0, 0),
          localPoint: new THREE.Vector3(box.max.x, 0, 0)
        },
        {
          axis: "y",
          sign: -1,
          localPlane: new THREE.Plane(new THREE.Vector3(0, 1, 0), -box.min.y),
          localNormal: new THREE.Vector3(0, 1, 0),
          localPoint: new THREE.Vector3(0, box.min.y, 0)
        },
        {
          axis: "y",
          sign: 1,
          localPlane: new THREE.Plane(new THREE.Vector3(0, -1, 0), box.max.y),
          localNormal: new THREE.Vector3(0, -1, 0),
          localPoint: new THREE.Vector3(0, box.max.y, 0)
        },
        {
          axis: "z",
          sign: -1,
          localPlane: new THREE.Plane(new THREE.Vector3(0, 0, 1), -box.min.z),
          localNormal: new THREE.Vector3(0, 0, 1),
          localPoint: new THREE.Vector3(0, 0, box.min.z)
        },
        {
          axis: "z",
          sign: 1,
          localPlane: new THREE.Plane(new THREE.Vector3(0, 0, -1), box.max.z),
          localNormal: new THREE.Vector3(0, 0, -1),
          localPoint: new THREE.Vector3(0, 0, box.max.z)
        }
      ];
    }

    function isSectionFaceActive(axis, sign) {
      if (!state.sectionBoxCurrent || !state.sectionBoxOriginal) {
        return false;
      }
      const tolerance = 1.0e-3;
      if (sign > 0) {
        return state.sectionBoxCurrent.max[axis] < state.sectionBoxOriginal.max[axis] - tolerance;
      }
      return state.sectionBoxCurrent.min[axis] > state.sectionBoxOriginal.min[axis] + tolerance;
    }

    function createSectionCapStencilGroup(geometry, renderOrder) {
      const group = new THREE.Group();
      const baseMaterial = new THREE.MeshBasicMaterial({
        depthWrite: false,
        depthTest: false,
        colorWrite: false,
        stencilWrite: true,
        stencilFunc: THREE.AlwaysStencilFunc
      });

      const backMaterial = baseMaterial.clone();
      backMaterial.side = THREE.BackSide;
      backMaterial.clippingPlanes = [];
      backMaterial.stencilFail = THREE.IncrementWrapStencilOp;
      backMaterial.stencilZFail = THREE.IncrementWrapStencilOp;
      backMaterial.stencilZPass = THREE.IncrementWrapStencilOp;
      const backMesh = new THREE.Mesh(geometry, backMaterial);
      backMesh.renderOrder = renderOrder;
      group.add(backMesh);

      const frontMaterial = baseMaterial.clone();
      frontMaterial.side = THREE.FrontSide;
      frontMaterial.clippingPlanes = [];
      frontMaterial.stencilFail = THREE.DecrementWrapStencilOp;
      frontMaterial.stencilZFail = THREE.DecrementWrapStencilOp;
      frontMaterial.stencilZPass = THREE.DecrementWrapStencilOp;
      const frontMesh = new THREE.Mesh(geometry, frontMaterial);
      frontMesh.renderOrder = renderOrder;
      group.add(frontMesh);

      return {
        group,
        backMesh,
        frontMesh
      };
    }

    function buildSectionCapsForMesh(mesh) {
      if (!state.scene || !state.sectionBoxOriginal) {
        return;
      }

      const original = state.sectionBoxOriginal;
      const size = new THREE.Vector3().subVectors(original.max, original.min);
      const planeSize = Math.max(size.x, size.y, size.z, 1.0) * 2.5;
      const planeGeometry = new THREE.PlaneGeometry(planeSize, planeSize);
      const specs = buildLocalSectionPlaneSpecs(state.sectionBoxCurrent);

      const group = new THREE.Group();
      group.name = "sectionCaps";
      state.sectionCaps = specs.map((spec, index) => {
        const stencil = createSectionCapStencilGroup(mesh.geometry, 20 + index * 2);
        group.add(stencil.group);

        const capMaterial = createPreviewMeshMaterial(false);
        capMaterial.clippingPlanes = [];
        capMaterial.transparent = !!ui.transparentView?.checked;
        capMaterial.opacity = !!ui.transparentView?.checked ? SOLID_VIEW_OPACITY : 1.0;
        capMaterial.stencilWrite = true;
        capMaterial.stencilRef = 0;
        capMaterial.stencilFunc = THREE.NotEqualStencilFunc;
        capMaterial.stencilFail = THREE.ReplaceStencilOp;
        capMaterial.stencilZFail = THREE.ReplaceStencilOp;
        capMaterial.stencilZPass = THREE.ReplaceStencilOp;
        const capMesh = new THREE.Mesh(planeGeometry, capMaterial);
        capMesh.renderOrder = 20 + index * 2 + 0.1;
        capMesh.onAfterRender = (renderer) => renderer.clearStencil();
        group.add(capMesh);

        return {
          axis: spec.axis,
          sign: spec.sign,
          localNormal: spec.localNormal.clone(),
          localPoint: spec.localPoint.clone(),
          stencilGroup: stencil.group,
          backMesh: stencil.backMesh,
          frontMesh: stencil.frontMesh,
          capMesh
        };
      });

      state.scene.add(group);
      state.sectionCapGroup = group;
    }

    function updateSectionCaps(localPlaneSpecs, worldPlanes) {
      if (!state.currentMesh || !state.sectionCaps.length) {
        return;
      }

      state.currentMesh.updateMatrixWorld(true);
      const worldPosition = state.currentMesh.getWorldPosition(new THREE.Vector3());
      const worldQuaternion = state.currentMesh.getWorldQuaternion(new THREE.Quaternion());
      const worldScale = state.currentMesh.getWorldScale(new THREE.Vector3());

      for (let index = 0; index < state.sectionCaps.length; index += 1) {
        const cap = state.sectionCaps[index];
        const spec = localPlaneSpecs[index];
        const active = isSectionFaceActive(cap.axis, cap.sign);
        const otherPlanes = worldPlanes.filter((_, planeIndex) => planeIndex !== index);

        cap.stencilGroup.visible = active;
        cap.stencilGroup.position.copy(worldPosition);
        cap.stencilGroup.quaternion.copy(worldQuaternion);
        cap.stencilGroup.scale.copy(worldScale);
        cap.backMesh.material.clippingPlanes = [worldPlanes[index]];
        cap.frontMesh.material.clippingPlanes = [worldPlanes[index]];
        cap.backMesh.material.needsUpdate = true;
        cap.frontMesh.material.needsUpdate = true;

        const worldPoint = spec.localPoint.clone().applyMatrix4(state.currentMesh.matrixWorld);
        const worldNormal = spec.localNormal.clone().transformDirection(state.currentMesh.matrixWorld).normalize();
        cap.capMesh.visible = active;
        cap.capMesh.position.copy(worldPoint);
        cap.capMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), worldNormal);
        cap.capMesh.material.clippingPlanes = otherPlanes;
        cap.capMesh.material.needsUpdate = true;
      }
    }

    function serializeSectionBoxBounds(bounds) {
      if (!bounds?.min || !bounds?.max) {
        return null;
      }
      return {
        min: bounds.min.toArray(),
        max: bounds.max.toArray()
      };
    }

    function cloneSerializedSectionBoxBounds(serialized) {
      if (!serialized || !Array.isArray(serialized.min) || !Array.isArray(serialized.max)) {
        return null;
      }
      return {
        min: serialized.min.map(Number),
        max: serialized.max.map(Number)
      };
    }

    function rememberCurrentSectionBoxBounds() {
      const serialized = serializeSectionBoxBounds(state.sectionBoxCurrent);
      if (!serialized) {
        return;
      }
      state.pendingViewportState = {
        ...(state.pendingViewportState || {}),
        materialPreset: getPreviewMaterialKey(),
        colorPreset: getPreviewColorKey(),
        transparentView: !!ui.transparentView?.checked,
        clipBoxEdit: !!ui.clipBoxEdit?.checked,
        sectionBoxCurrent: serialized
      };
    }

    function applySavedSectionBoxBounds(serialized) {
      if (!serialized || !state.sectionBoxCurrent || !state.sectionBoxOriginal) {
        return;
      }
      const minIn = Array.isArray(serialized.min) ? serialized.min.map(Number) : null;
      const maxIn = Array.isArray(serialized.max) ? serialized.max.map(Number) : null;
      if (!minIn || !maxIn || minIn.length !== 3 || maxIn.length !== 3) {
        return;
      }

      const current = state.sectionBoxCurrent;
      const original = state.sectionBoxOriginal;
      const fullSize = Math.max(
        original.max.x - original.min.x,
        original.max.y - original.min.y,
        original.max.z - original.min.z,
        1.0
      );
      const minGap = Math.max(fullSize * 0.02, 0.5);
      current.min.x = THREE.MathUtils.clamp(minIn[0], original.min.x, original.max.x - minGap);
      current.max.x = THREE.MathUtils.clamp(maxIn[0], current.min.x + minGap, original.max.x);
      current.min.y = THREE.MathUtils.clamp(minIn[1], original.min.y, original.max.y - minGap);
      current.max.y = THREE.MathUtils.clamp(maxIn[1], current.min.y + minGap, original.max.y);
      current.min.z = THREE.MathUtils.clamp(minIn[2], original.min.z, original.max.z - minGap);
      current.max.z = THREE.MathUtils.clamp(maxIn[2], current.min.z + minGap, original.max.z);
      updateSectionBoxVisuals();
      updateSectionClippingPlanes();
    }

    function applyPendingViewportStateToCurrentMesh() {
      if (!state.pendingViewportState) {
        return;
      }
      if (state.pendingViewportState.sectionBoxCurrent) {
        applySavedSectionBoxBounds(state.pendingViewportState.sectionBoxCurrent);
      }
      state.pendingViewportState = null;
    }

    function applySavedCameraState(cameraState) {
      if (!cameraState || !state.camera || !state.controls) {
        return;
      }
      const position = Array.isArray(cameraState.position) ? cameraState.position.map(Number) : null;
      const target = Array.isArray(cameraState.target) ? cameraState.target.map(Number) : null;
      if (position && position.length === 3) {
        state.camera.position.fromArray(position);
      }
      if (target && target.length === 3) {
        state.controls.target.fromArray(target);
      }
      state.controls.update();
    }

    function disposeSectionBox() {
      state.dragHandle = null;
      state.sectionBoxOriginal = null;
      state.sectionBoxCurrent = null;
      state.sectionPlanes = [];
      if (state.currentMesh && state.currentMesh.material) {
        state.currentMesh.material.clippingPlanes = [];
        state.currentMesh.material.needsUpdate = true;
      }
      if (!state.sectionBoxGroup) {
        state.sectionHandles = [];
        state.sectionBoxWire = null;
      } else {
        state.sectionBoxGroup.traverse((obj) => {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (Array.isArray(obj.material)) {
              obj.material.forEach((mat) => mat.dispose());
            } else {
              obj.material.dispose();
            }
          }
        });
        if (state.sectionBoxGroup.parent) {
          state.sectionBoxGroup.parent.remove(state.sectionBoxGroup);
        }
      }

      if (state.sectionCapGroup) {
        state.sectionCapGroup.traverse((obj) => {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (Array.isArray(obj.material)) {
              obj.material.forEach((mat) => mat.dispose());
            } else {
              obj.material.dispose();
            }
          }
        });
        if (state.sectionCapGroup.parent) {
          state.sectionCapGroup.parent.remove(state.sectionCapGroup);
        }
      }

      state.sectionBoxGroup = null;
      state.sectionCapGroup = null;
      state.sectionCaps = [];
      state.sectionBoxWire = null;
      state.sectionHandles = [];
    }

    function updateSectionClippingPlanes() {
      if (!state.currentMesh || !state.currentMesh.material || !state.sectionBoxCurrent) {
        return;
      }
      state.currentMesh.updateMatrixWorld(true);
      const box = state.sectionBoxCurrent;
      const worldMatrix = state.currentMesh.matrixWorld;
      const worldNormalMatrix = new THREE.Matrix3().getNormalMatrix(worldMatrix);
      const localPlaneSpecs = buildLocalSectionPlaneSpecs(box);
      state.sectionPlanes = localPlaneSpecs.map((spec) => spec.localPlane.clone().applyMatrix4(worldMatrix, worldNormalMatrix));
      state.currentMesh.material.clippingPlanes = state.sectionPlanes;
      state.currentMesh.material.needsUpdate = true;
      updateSectionCaps(localPlaneSpecs, state.sectionPlanes);
    }

    function updateSectionBoxVisuals() {
      if (!state.sectionBoxWire || !state.sectionBoxCurrent) {
        return;
      }
      const min = state.sectionBoxCurrent.min;
      const max = state.sectionBoxCurrent.max;
      const size = new THREE.Vector3(
        Math.max(max.x - min.x, 0.05),
        Math.max(max.y - min.y, 0.05),
        Math.max(max.z - min.z, 0.05)
      );
      const center = new THREE.Vector3(
        0.5 * (min.x + max.x),
        0.5 * (min.y + max.y),
        0.5 * (min.z + max.z)
      );
      state.sectionBoxWire.position.copy(center);
      state.sectionBoxWire.scale.copy(size);
      state.sectionBoxWire.visible = !!ui.clipBoxEdit?.checked;

      const handleSize = Math.max(Math.max(size.x, size.y, size.z) * 0.045, 1.0);
      for (const handle of state.sectionHandles) {
        const pos = center.clone();
        pos[handle.userData.axis] = handle.userData.sign > 0 ? max[handle.userData.axis] : min[handle.userData.axis];
        handle.position.copy(pos);
        handle.scale.setScalar(handleSize);
        handle.visible = !!ui.clipBoxEdit?.checked;
      }
    }

    function buildSectionBoxForMesh(mesh) {
      disposeSectionBox();
      mesh.geometry.computeBoundingBox();
      var bbox = mesh.geometry.boundingBox.clone();
      bbox.min.z = 0;
      state.sectionBoxOriginal = {
        min: bbox.min.clone(),
        max: bbox.max.clone()
      };
      state.sectionBoxCurrent = sectionBoxBoundsCopy(state.sectionBoxOriginal);

      const group = new THREE.Group();
      group.name = "sectionBox";

      const wireGroup = new THREE.Group();
      const visibleWire = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)),
        new THREE.LineBasicMaterial({
          color: 0x7ec6ff,
          transparent: true,
          opacity: 0.9,
          depthTest: true,
          depthWrite: false
        })
      );
      visibleWire.renderOrder = 2;
      wireGroup.add(visibleWire);

      const hiddenWire = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)),
        new THREE.LineDashedMaterial({
          color: 0x7ec6ff,
          transparent: true,
          opacity: 0.26,
          dashSize: 0.08,
          gapSize: 0.12,
          depthTest: true,
          depthWrite: false,
          depthFunc: THREE.GreaterDepth
        })
      );
      hiddenWire.computeLineDistances();
      hiddenWire.renderOrder = 1;
      wireGroup.add(hiddenWire);

      wireGroup.visible = !!ui.clipBoxEdit?.checked;
      group.add(wireGroup);

      const handleGeometry = new THREE.ConeGeometry(0.5, 1.2, 20);
      const handleMaterial = new THREE.MeshBasicMaterial({
        color: 0xe5ba63,
        transparent: true,
        opacity: 0.45,
        depthTest: false
      });

      const faces = [
        { axis: "x", sign: -1 },
        { axis: "x", sign: 1 },
        { axis: "y", sign: -1 },
        { axis: "y", sign: 1 },
        { axis: "z", sign: -1 },
        { axis: "z", sign: 1 }
      ];

      state.sectionHandles = faces.map((face) => {
        const handle = new THREE.Mesh(handleGeometry.clone(), handleMaterial.clone());
        handle.userData = { axis: face.axis, sign: face.sign };
        handle.renderOrder = 3;
        if (face.axis === "x") {
          handle.rotation.z = face.sign > 0 ? -Math.PI * 0.5 : Math.PI * 0.5;
        } else if (face.axis === "y") {
          handle.rotation.x = face.sign > 0 ? 0.0 : Math.PI;
        } else {
          handle.rotation.x = face.sign > 0 ? Math.PI * 0.5 : -Math.PI * 0.5;
        }
        group.add(handle);
        return handle;
      });

      mesh.add(group);
      state.sectionBoxGroup = group;
      state.sectionBoxWire = wireGroup;
      buildSectionCapsForMesh(mesh);
      updateSectionBoxVisuals();
      updateSectionClippingPlanes();
      // Restore cut box coordinates if pending
      applyPendingViewportStateToCurrentMesh();
      setSectionEditMode(!!ui.clipBoxEdit?.checked);
    }

    function resetSectionFaceFromHandle(handle) {
      if (!handle || !state.sectionBoxOriginal || !state.sectionBoxCurrent) {
        return;
      }
      const axis = handle.userData.axis;
      const sign = handle.userData.sign;
      if (sign > 0) {
        state.sectionBoxCurrent.max[axis] = state.sectionBoxOriginal.max[axis];
      } else {
        state.sectionBoxCurrent.min[axis] = state.sectionBoxOriginal.min[axis];
      }
      updateSectionBoxVisuals();
      updateSectionClippingPlanes();
      rememberCurrentSectionBoxBounds();
      scheduleBrowserStateSave();
    }

    function onViewportPointerDown(event) {
      if (!ui.clipBoxEdit?.checked || !state.currentMesh || !state.sectionHandles.length) {
        return;
      }
      const handle = getSectionHandleAtPointer(event);
      if (!handle) {
        updateViewportCursor(event);
        return;
      }
      const axis = handle.userData.axis;
      const sign = handle.userData.sign;
      const handleWorld = new THREE.Vector3();
      handle.getWorldPosition(handleWorld);
      const worldQuaternion = new THREE.Quaternion();
      state.currentMesh.getWorldQuaternion(worldQuaternion);
      const axisWorld = localAxisVector(axis, 1.0).applyQuaternion(worldQuaternion).normalize();
      const planeNormal = new THREE.Vector3();
      state.camera.getWorldDirection(planeNormal);
      const dragPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(planeNormal, handleWorld);
      const hitPoint = new THREE.Vector3();
      state.raycaster.ray.intersectPlane(dragPlane, hitPoint);
      state.dragHandle = {
        pointerId: event.pointerId,
        axis,
        sign,
        axisWorld,
        plane: dragPlane,
        startPoint: hitPoint.clone(),
        startValue: sign > 0 ? state.sectionBoxCurrent.max[axis] : state.sectionBoxCurrent.min[axis]
      };
      if (state.controls) {
        state.controls.enabled = false;
      }
      state.orbitDragging = false;
      state.renderer.domElement.setPointerCapture?.(event.pointerId);
      updateViewportCursor(event);
      event.stopImmediatePropagation();
      event.preventDefault();
    }

    function onViewportPointerMove(event) {
      if (!state.dragHandle || event.pointerId !== state.dragHandle.pointerId) {
        updateViewportCursor(event);
        return;
      }
      updatePointerNdc(event);
      state.raycaster.setFromCamera(state.pointerNdc, state.camera);
      const hitPoint = new THREE.Vector3();
      if (!state.raycaster.ray.intersectPlane(state.dragHandle.plane, hitPoint)) {
        return;
      }
      const delta = hitPoint.clone().sub(state.dragHandle.startPoint).dot(state.dragHandle.axisWorld);
      const axis = state.dragHandle.axis;
      const original = state.sectionBoxOriginal;
      const current = state.sectionBoxCurrent;
      const fullSize = Math.max(
        original.max.x - original.min.x,
        original.max.y - original.min.y,
        original.max.z - original.min.z,
        1.0
      );
      const minGap = Math.max(fullSize * 0.02, 0.5);
      if (state.dragHandle.sign > 0) {
        const next = THREE.MathUtils.clamp(
          state.dragHandle.startValue + delta,
          current.min[axis] + minGap,
          original.max[axis]
        );
        current.max[axis] = next;
      } else {
        const next = THREE.MathUtils.clamp(
          state.dragHandle.startValue + delta,
          original.min[axis],
          current.max[axis] - minGap
        );
        current.min[axis] = next;
      }
      updateSectionBoxVisuals();
      updateSectionClippingPlanes();
      rememberCurrentSectionBoxBounds();
      scheduleBrowserStateSave();
      updateViewportCursor(event);
      event.preventDefault();
    }

    function onViewportPointerUp(event) {
      if (!state.dragHandle) {
        updateViewportCursor(event);
        return;
      }
      if (event.pointerId !== undefined && state.dragHandle.pointerId !== undefined && event.pointerId !== state.dragHandle.pointerId) {
        return;
      }
      state.renderer.domElement.releasePointerCapture?.(state.dragHandle.pointerId);
      state.dragHandle = null;
      if (state.controls) {
        state.controls.enabled = true;
      }
      updateViewportCursor(event);
    }

    function onViewportDoubleClick(event) {
      if (!state.currentMesh) {
        return;
      }
      updatePointerNdc(event);
      state.raycaster.setFromCamera(state.pointerNdc, state.camera);

      if (ui.clipBoxEdit?.checked && state.sectionHandles.length) {
        const handleHits = state.raycaster.intersectObjects(state.sectionHandles, false);
        if (handleHits.length) {
          resetSectionFaceFromHandle(handleHits[0].object);
          event.preventDefault();
          return;
        }
      }

      const modelTargets = [state.currentMesh];
      if (state.currentOverlay) {
        modelTargets.push(state.currentOverlay);
      }
      for (const cap of state.sectionCaps) {
        if (cap.capMesh?.visible) {
          modelTargets.push(cap.capMesh);
        }
      }

      const modelHits = state.raycaster.intersectObjects(modelTargets, true);
      if (!modelHits.length) {
        return;
      }

      ui.clipBoxEdit.checked = !ui.clipBoxEdit.checked;
      setSectionEditMode(ui.clipBoxEdit.checked);
      scheduleBrowserStateSave();
      event.preventDefault();
    }

    function getParams() {
      return {
        preset: ui.preset.value,
        profileLength: Number(ui.length.value),
        profileThickness: Number(ui.thickness.value) || FIXED_PROFILE_THICKNESS,
        p: Number(ui.p.value),
        q: Number(ui.q.value),
        alpha: Number(ui.alpha.value),
        beta: Number(ui.beta.value),
        buoyancyG: Number(ui.buoyancy.value),
        wallThickness: Number(ui.wallThickness.value),
        bore: Number(ui.bore.value),
        tripodAttachZ: Number(ui.tripodAttachZ.value),
        tripodAttachZ2: Number(ui.tripodAttachZ2.value),
        tripodOffsetDeg: Number(ui.tripodOffsetDeg.value),
        legThickness: Number(ui.legThickness.value),
        baseThickness: Number(ui.baseThickness.value),
        floatBaseGap: Number(ui.floatBaseGap.value),
        baseRadiusFactor: Number(ui.baseRadiusFactor.value),
        ledD: Number(ui.ledD.value),
        ledLen: Number(ui.ledLen.value),
        drainAngleDeg: Number(ui.drainAngle.value),
        drainHoleDiameter: Number(ui.drainDiameter.value),
        postBaseFilletRadius: Math.abs(Number(ui.postBaseFillet.value)),
        postTailFilletRadius: Math.abs(Number(ui.postTailFillet.value)),
        noBase: ui.noBase.checked,
        invertBase: ui.invertBase.checked,
        noDrain: ui.noDrain.checked,
        ledCenterOffset: Number(ui.wallThickness.value) + Number(ui.ledD.value) / 2.0 + Number(ui.bore.value) / 2.0
      };
    }

    function setParams(params) {
      if (params.preset !== undefined) ui.preset.value = params.preset;
      if (params.profileLength !== undefined) ui.length.value = params.profileLength;
      if (params.profileThickness !== undefined) {
        ui.thickness.value = params.profileThickness;
      } else if (!ui.thickness.value) {
        ui.thickness.value = FIXED_PROFILE_THICKNESS;
      }
      if (params.p !== undefined) ui.p.value = params.p;
      if (params.q !== undefined) ui.q.value = params.q;
      if (params.alpha !== undefined) ui.alpha.value = params.alpha;
      if (params.beta !== undefined) ui.beta.value = params.beta;
      if (params.buoyancyG !== undefined) {
        setInputNumericValue(ui.buoyancy, Number(params.buoyancyG));
      }
      if (params.wallThickness !== undefined) ui.wallThickness.value = params.wallThickness;
      if (params.bore !== undefined) ui.bore.value = params.bore;
      if (params.tripodAttachZ !== undefined) ui.tripodAttachZ.value = params.tripodAttachZ;
      if (params.tripodAttachZ2 !== undefined) ui.tripodAttachZ2.value = params.tripodAttachZ2;
      if (params.tripodOffsetDeg !== undefined) ui.tripodOffsetDeg.value = params.tripodOffsetDeg;
      if (params.legThickness !== undefined) ui.legThickness.value = params.legThickness;
      if (params.baseThickness !== undefined) ui.baseThickness.value = params.baseThickness;
      if (params.floatBaseGap !== undefined) ui.floatBaseGap.value = params.floatBaseGap;
      if (params.baseRadiusFactor !== undefined) ui.baseRadiusFactor.value = params.baseRadiusFactor;
      if (params.ledD !== undefined) ui.ledD.value = params.ledD;
      if (params.ledLen !== undefined) ui.ledLen.value = params.ledLen;
      if (params.drainAngleDeg !== undefined) ui.drainAngle.value = params.drainAngleDeg;
      if (params.drainHoleDiameter !== undefined) ui.drainDiameter.value = params.drainHoleDiameter;
      if (params.postBaseFilletRadius !== undefined) ui.postBaseFillet.value = Math.abs(params.postBaseFilletRadius);
      if (params.postTailFilletRadius !== undefined) ui.postTailFillet.value = Math.abs(params.postTailFilletRadius);
      if (params.noBase !== undefined) ui.noBase.checked = !!params.noBase;
      if (params.invertBase !== undefined) ui.invertBase.checked = !!params.invertBase;
      if (params.noDrain !== undefined) ui.noDrain.checked = !!params.noDrain;
      updateLabels();
      drawProfile();
    }

    function applyPreset(name) {
      const presets = {
        circle: { profileLength: 100, profileThickness: FIXED_PROFILE_THICKNESS, p: 2, q: 2, alpha: 0, beta: 0 },
        ellipse: { profileLength: 185.71, profileThickness: FIXED_PROFILE_THICKNESS, p: 2, q: 2, alpha: 0, beta: 0 },
        egg: { profileLength: 179.31, profileThickness: FIXED_PROFILE_THICKNESS, p: 2.1, q: 1.6, alpha: -0.35, beta: 0.18 },
        cigar: { profileLength: 309.09, profileThickness: FIXED_PROFILE_THICKNESS, p: 2.2, q: 5.5, alpha: 0.0, beta: -0.05 },
        teardrop: { profileLength: 213.33, profileThickness: FIXED_PROFILE_THICKNESS, p: 1.6, q: 1.25, alpha: -0.55, beta: 0.2 },
        tictac: { profileLength: 183.33, profileThickness: FIXED_PROFILE_THICKNESS, p: 2.0, q: 1000, alpha: 0.0, beta: -0.5 },
        custom: { profileLength: 216.67, profileThickness: FIXED_PROFILE_THICKNESS, p: 2, q: 2, alpha: 0, beta: 0 }
      };
      setParams({ preset: name, ...(presets[name] || presets.custom) });
    }

    function updateLabels() {
      let displayLength = Number(ui.length.value);
      let displayThickness = Number(ui.thickness.value);
      try {
        const solved = solveOuterDimensions(getParams());
        if (Number.isFinite(solved.length)) {
          displayLength = solved.length;
        }
        if (Number.isFinite(solved.diameter)) {
          displayThickness = solved.diameter;
        }
      } catch {
        // Keep slider values while fields are temporarily incomplete during editing.
      }
      ui.lengthVal.textContent = `${displayLength.toFixed(1)} mm`;
      ui.thicknessVal.textContent = `${displayThickness.toFixed(1)} mm`;
      ui.pVal.textContent = Number(ui.p.value).toFixed(2);
      ui.qVal.textContent = Number(ui.q.value).toFixed(2);
      const alphaValue = Number(ui.alpha.value).toFixed(2);
      const betaValue = Number(ui.beta.value).toFixed(2);
      const alphaLabel = ui.alpha.closest(".control")?.querySelector("label");
      const betaLabel = ui.beta.closest(".control")?.querySelector("label");
      if (alphaLabel) alphaLabel.dataset.inlineValue = alphaValue;
      if (betaLabel) betaLabel.dataset.inlineValue = betaValue;
      ui.alphaVal.textContent = alphaValue;
      ui.betaVal.textContent = betaValue;
    }

    function profileRadiusFactor(params, s) {
      s = Math.max(-1.0, Math.min(1.0, s));
      if (params.preset === "tictac") {
        const epsilon = 0.15;
        const rounded = Math.max(0.0, 1.0 - Math.pow(Math.abs(s), 18));
        return Math.pow(rounded, 0.5) * (1.0 - epsilon + epsilon * (1.0 - s * s));
      }

      const core = Math.max(0.0, 1.0 - Math.pow(Math.abs(s), params.q));
      const radius = Math.pow(core, 1.0 / params.p);
      const modifier = 1.0 + params.alpha * s + params.beta * (1.0 - s * s);
      return Math.max(0.0, radius * Math.max(0.0, modifier));
    }

    function sampledProfilePoints(params, samples = 320) {
      const halfThickness = params.profileThickness * 0.5;
      const pts = [];
      for (let i = 0; i <= samples; i += 1) {
        const t = i / samples;
        const s = 1.0 - 2.0 * t;
        const radius = profileRadiusFactor(params, s) * halfThickness;
        const z = t * params.profileLength;
        pts.push({ z, r: radius });
      }
      return pts;
    }

    function solveReferenceOuterVolume(params, samples = 4096) {
      let total = 0.0;
      const step = 1.0 / samples;
      let previous = 0.0;
      for (let i = 0; i <= samples; i += 1) {
        const t = i / samples;
        const s = 1.0 - 2.0 * t;
        const radius = 0.5 * params.profileThickness * profileRadiusFactor(params, s);
        const area = Math.PI * radius * radius;
        if (i > 0) {
          total += 0.5 * (previous + area) * (params.profileLength * step);
        }
        previous = area;
      }
      return total;
    }

    function boreArea(params) {
      return Math.PI * Math.pow(params.bore * 0.5, 2);
    }

    function ledOpenVolume(params) {
      return Math.PI * Math.pow(params.ledD * 0.5, 2) * params.ledLen;
    }

    function solvedTargetVolume(params) {
      return params.buoyancyG * 1000.0 + ledOpenVolume(params);
    }

    function solveProfileScale(params) {
      const referenceOuterVolume = solveReferenceOuterVolume(params);
      const targetVolume = solvedTargetVolume(params);
      let low = 0.0;
      let high = Math.max(1.0, Math.cbrt(targetVolume / Math.max(referenceOuterVolume, 1e-9)));

      while (
        referenceOuterVolume * high * high * high
          - boreArea(params) * (params.profileLength * high)
          - targetVolume < 0.0
      ) {
        high *= 2.0;
      }

      for (let i = 0; i < 48; i += 1) {
        const mid = 0.5 * (low + high);
        const netVolume = referenceOuterVolume * mid * mid * mid
          - boreArea(params) * (params.profileLength * mid)
          - targetVolume;
        if (netVolume < 0.0) {
          low = mid;
        } else {
          high = mid;
        }
      }
      return high;
    }

    function solveOuterDimensions(params) {
      const scale = solveProfileScale(params);
      return {
        scale,
        length: params.profileLength * scale,
        diameter: params.profileThickness * scale
      };
    }

    function rAtLocal(params, zLocal, length) {
      const scale = length / params.profileLength;
      const halfThickness = 0.5 * params.profileThickness * scale;
      const s = 1.0 - 2.0 * (zLocal / length);
      return profileRadiusFactor(params, s) * halfThickness;
    }

    function rInnerLocal(params, zLocal, length) {
      return Math.max(0.05, rAtLocal(params, zLocal, length) - params.wallThickness);
    }

    function firstLocalZForRadius(params, length, targetRadius) {
      if (targetRadius <= 0.0) return 0.0;
      let lower = 0.0;
      let upper = Math.min(length, 1.0);
      while (upper < length && rAtLocal(params, upper, length) < targetRadius) {
        lower = upper;
        upper = Math.min(length, upper * 2.0);
      }
      if (rAtLocal(params, upper, length) < targetRadius) {
        return length;
      }
      for (let i = 0; i < 24; i += 1) {
        const mid = 0.5 * (lower + upper);
        if (rAtLocal(params, mid, length) < targetRadius) {
          lower = mid;
        } else {
          upper = mid;
        }
      }
      return upper;
    }

    function rAtLocalOriented(params, zLocal, length, invertOrientation) {
      const sampleLocalZ = invertOrientation ? (length - zLocal) : zLocal;
      return rAtLocal(params, sampleLocalZ, length);
    }

    function firstLocalZForRadiusOriented(params, length, targetRadius, invertOrientation) {
      if (targetRadius <= 0.0) return 0.0;
      let lower = 0.0;
