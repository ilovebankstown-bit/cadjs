      profileCtx.lineTo(lengthBottom.x, lengthBottom.y);
      profileCtx.stroke();
      drawArrowHead(profileCtx, lengthTop.x, lengthTop.y, 0, -1, 7);
      drawArrowHead(profileCtx, lengthBottom.x, lengthBottom.y, 0, 1, 7);
      profileCtx.restore();
      const lengthHandleY = 0.5 * (lengthTop.y + lengthBottom.y);
      registerHandle({
        id: "profileLength",
        x: lengthDimX,
        y: lengthHandleY,
        axis: "y",
        input: ui.length,
        sensitivity: mmPerPixel,
        color: "rgba(255, 209, 102, 0.98)",
        label: `Length ${length.toFixed(1)} mm`,
        labelDx: -20,
        labelDy: 0,
        labelRotationDeg: -90
      });

      const outerLeftTop = projectPoint({ x: minX, y: maxY });
      const thicknessDimY = outerLeftTop.y - 42;
      const thicknessLeft = { x: outerLeftTop.x, y: thicknessDimY };
      const thicknessRight = { x: outerRightTop.x, y: thicknessDimY };
      profileCtx.save();
      profileCtx.strokeStyle = "rgba(122, 220, 176, 0.95)";
      profileCtx.fillStyle = "rgba(122, 220, 176, 0.95)";
      profileCtx.lineWidth = 1.5;
      profileCtx.beginPath();
      profileCtx.moveTo(outerLeftTop.x, outerLeftTop.y - 8);
      profileCtx.lineTo(thicknessLeft.x, thicknessLeft.y);
      profileCtx.moveTo(outerRightTop.x, outerRightTop.y - 8);
      profileCtx.lineTo(thicknessRight.x, thicknessRight.y);
      profileCtx.moveTo(thicknessLeft.x, thicknessLeft.y);
      profileCtx.lineTo(thicknessRight.x, thicknessRight.y);
      profileCtx.stroke();
      drawArrowHead(profileCtx, thicknessLeft.x, thicknessLeft.y, -1, 0, 7);
      drawArrowHead(profileCtx, thicknessRight.x, thicknessRight.y, 1, 0, 7);
      profileCtx.restore();
      registerHandle({
        id: "profileThickness",
        x: 0.5 * (thicknessLeft.x + thicknessRight.x),
        y: thicknessDimY,
        axis: "x",
        input: ui.thickness,
        sensitivity: mmPerPixel,
        color: "rgba(122, 220, 176, 0.98)",
        label: `Thickness ${diameter.toFixed(1)} mm`,
        labelDx: 0,
        labelDy: -24
      });

      const buoyancyControlX = minX + boundsWidth * 0.18;
      const buoyancyAnchor = projectPoint({ x: buoyancyControlX, y: minY });
      registerHandle({
        id: "buoyancy",
        x: buoyancyAnchor.x,
        y: buoyancyAnchor.y + 26,
        axis: "x",
        input: ui.buoyancy,
        sensitivity: 0.2,
        color: "rgba(122, 220, 176, 0.98)",
        label: `Buoy ${Number(ui.buoyancy.value).toFixed(0)} g`,
        labelDx: 0,
        labelDy: 24
      });

      const profileCenterY = 0.5 * (minY + maxY);
      const boreAnchor = projectPoint({ x: 0.0, y: profileCenterY });
      registerHandle({
        id: "bore",
        x: boreAnchor.x,
        y: boreAnchor.y,
        axis: "x",
        input: ui.bore,
        sensitivity: mmPerPixel,
        color: "rgba(255, 196, 104, 0.98)",
        label: `Bore ${Number(ui.bore.value).toFixed(1)} mm`,
        labelDx: 0,
        labelDy: 22
      });

      const leftControlX = minX + boundsWidth * 0.1;
      const rightControlX = maxX - boundsWidth * 0.1;
      const pqAnchor = projectPoint({ x: leftControlX, y: profileCenterY });
      const alphaBetaAnchor = projectPoint({ x: rightControlX, y: profileCenterY });

      registerHandle({
        id: "roundnessTaperPQ",
        x: pqAnchor.x,
        y: pqAnchor.y,
        axis: "xy",
        cursor: "move",
        dragMode: "bi2d",
        inputX: ui.p,
        inputY: ui.q,
        sensitivityX: 0.01,
        sensitivityY: 0.01,
        axisSignX: 1,
        axisSignY: -1,
        color: "rgba(142, 214, 255, 0.98)",
        label: `p ${Number(ui.p.value).toFixed(2)} / q ${Number(ui.q.value).toFixed(2)}`,
        labelDx: 0,
        labelDy: 24
      });
      registerHandle({
        id: "alphaBetaBi",
        x: alphaBetaAnchor.x,
        y: alphaBetaAnchor.y,
        axis: "xy",
        cursor: "move",
        dragMode: "bi2d",
        inputX: ui.alpha,
        inputY: ui.beta,
        sensitivityX: 0.01,
        sensitivityY: 0.02,
        axisSignX: 1,
        axisSignY: -1,
        color: "rgba(244, 168, 136, 0.98)",
        label: `α ${Number(ui.alpha.value).toFixed(2)} / β ${Number(ui.beta.value).toFixed(2)}`,
        labelDx: 0,
        labelDy: 24
      });

      const curveTargets = [];
      if (drainOverlay?.centerline?.length >= 2) {
        curveTargets.push({
          id: "drainAngleCurve",
          axis: "angle",
          dragMode: "drainAngle",
          input: ui.drainAngle,
          cursor: "crosshair",
          polyline: drainOverlay.centerline.map(projectPoint),
          anchor: projectPoint(drainOverlay.centerline[0]),
          hitRadius: 12,
          dragThresholdPx: 6
        });
      }
      if (ledLengthLine.length >= 2) {
        curveTargets.push({
          id: "ledLengthCurve",
          axis: "y",
          input: ui.ledLen,
          sensitivity: mmPerPixel,
          cursor: "ns-resize",
          polyline: ledLengthLine.map(projectPoint),
          hitRadius: 12,
          dragThresholdPx: 4
        });
      }
      if (ledDiameterLine.length >= 2) {
        curveTargets.push({
          id: "ledDiameterCurve",
          axis: "x",
          input: ui.ledD,
          sensitivity: mmPerPixel,
          cursor: "ew-resize",
          polyline: ledDiameterLine.map(projectPoint),
          hitRadius: 12,
          dragThresholdPx: 4
        });
      }
      if (baseFilletBoundaryHalf.length >= 2) {
        curveTargets.push({
          id: "baseFilletCurveRight",
          axis: "y",
          axisSign: -1,
          input: ui.postBaseFillet,
          sensitivity: mmPerPixel * 0.2,
          cursor: "ns-resize",
          polyline: baseFilletBoundaryHalf.map(projectPoint),
          hitRadius: 12,
          dragThresholdPx: 6
        });
        curveTargets.push({
          id: "baseFilletCurveLeft",
          axis: "y",
          axisSign: -1,
          input: ui.postBaseFillet,
          sensitivity: mmPerPixel * 0.2,
          cursor: "ns-resize",
          polyline: baseFilletBoundaryHalf.map(projectMirrorPoint),
          hitRadius: 12,
          dragThresholdPx: 6
        });
      }
      if (tailFilletBoundaryHalf.length >= 2) {
        curveTargets.push({
          id: "tailFilletCurveRight",
          axis: "y",
          axisSign: 1,
          input: ui.postTailFillet,
          sensitivity: mmPerPixel * 0.2,
          cursor: "ns-resize",
          polyline: tailFilletBoundaryHalf.map(projectPoint),
          hitRadius: 12,
          dragThresholdPx: 6
        });
        curveTargets.push({
          id: "tailFilletCurveLeft",
          axis: "y",
          axisSign: 1,
          input: ui.postTailFillet,
          sensitivity: mmPerPixel * 0.2,
          cursor: "ns-resize",
          polyline: tailFilletBoundaryHalf.map(projectMirrorPoint),
          hitRadius: 12,
          dragThresholdPx: 6
        });
      }

      state.profileFilletInteraction = {
        handles,
        curveTargets,
        width,
        height
      };
    }

    function onProfileInteractiveChange() {
      ui.preset.value = "custom";
      updateLabels();
      drawProfile();
      scheduleBrowserStateSave();
      scheduleBuild("profile-drag");
    }

    function onProfilePointerDown(event) {
      if (event.button !== 0 && event.button !== 2) {
        return;
      }
      const point = getProfileCanvasPoint(event);
      const isLayoutDrag = event.button === 2;
      const handle = isLayoutDrag ? getProfileKnobAt(point) : getProfileHandleAt(point);
      if (!handle) {
        updateProfileCursor(point);
        return;
      }
      event.preventDefault();
      profileCanvas.setPointerCapture(event.pointerId);
      if (isLayoutDrag) {
        const startOffset = getProfileHandleOffset(handle.id);
        state.profileFilletDrag = {
          pointerId: event.pointerId,
          handleId: handle.id,
          axis: handle.axis,
          cursor: "move",
          startX: point.x,
          startY: point.y,
          startOffset,
          active: true,
          mode: "layout"
        };
      } else {
        state.profileFilletDrag = {
          pointerId: event.pointerId,
          handleId: handle.id,
          axis: handle.axis,
          cursor: handle.cursor,
          startX: point.x,
          startY: point.y,
          startValue: getProfileHandleStartValue(handle),
          active: false,
          mode: "value"
        };
      }
      updateProfileCursor(point);
    }

    function onProfilePointerMove(event) {
      const point = getProfileCanvasPoint(event);
      const drag = state.profileFilletDrag;
      if (!drag || drag.pointerId !== event.pointerId) {
        updateProfileCursor(point);
        return;
      }

      const handle = getProfileDragTargetById(drag.handleId);
      if (!handle) {
        return;
      }
      if (drag.mode === "layout") {
        const changed = setProfileHandleOffset(
          handle.id,
          drag.startOffset.x + (point.x - drag.startX),
          drag.startOffset.y + (point.y - drag.startY)
        );
        if (changed) {
          drawProfile();
          scheduleBrowserStateSave();
        }
        updateProfileCursor(point);
        return;
      }
      if (!drag.active) {
        const activationThresholdPx = Math.max(0, Number(handle.dragThresholdPx) || 0);
        const travel = Math.hypot(point.x - drag.startX, point.y - drag.startY);
        if (travel <= activationThresholdPx) {
          updateProfileCursor(point);
          return;
        }
        drag.active = true;
        drag.startX = point.x;
        drag.startY = point.y;
        drag.startValue = getProfileHandleStartValue(handle);
        updateProfileCursor(point);
        return;
      }
      const changed = applyProfileHandleDrag(
        handle,
        drag.startValue,
        point.x - drag.startX,
        point.y - drag.startY,
        point
      );
      if (changed) {
        onProfileInteractiveChange();
      } else {
        updateProfileCursor(point);
      }
    }

    function onProfilePointerUp(event) {
      if (state.profileFilletDrag && state.profileFilletDrag.pointerId === event.pointerId) {
        state.profileFilletDrag = null;
      }
      if (profileCanvas.hasPointerCapture(event.pointerId)) {
        profileCanvas.releasePointerCapture(event.pointerId);
      }
      updateProfileCursor(getProfileCanvasPoint(event));
    }

    function onProfilePointerCancel(event) {
      if (state.profileFilletDrag && state.profileFilletDrag.pointerId === event.pointerId) {
        state.profileFilletDrag = null;
      }
      updateProfileCursor();
    }

    function onProfileContextMenu(event) {
      const point = getProfileCanvasPoint(event);
      if (state.profileFilletDrag?.mode === "layout" || getProfileKnobAt(point)) {
        event.preventDefault();
      }
    }

    function sanitizeFileToken(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9._-]+/g, "-")
        .replace(/^-+|-+$/g, "") || "custom";
    }

    function buildExportFilename(ext) {
      const buoyancy = Number(ui.buoyancy?.value);
      let length = Number(state.currentMetrics?.length);
      if (!Number.isFinite(length)) {
        try {
          length = Number(solveOuterDimensions(getParams()).length);
        } catch {
          length = Number.NaN;
        }
      }
      const buoyancyToken = Number.isFinite(buoyancy) ? `${Math.round(buoyancy)}g` : "custom";
      const lengthToken = Number.isFinite(length) ? `${Math.round(length)}mm` : "model";
      return `${sanitizeFileToken(`${buoyancyToken}_${lengthToken}`)}.${ext}`;
    }

    function buildSavePayload() {
      const liveSectionBoxCurrent = serializeSectionBoxBounds(state.sectionBoxCurrent);
      const persistedSectionBoxCurrent = liveSectionBoxCurrent
        || cloneSerializedSectionBoxBounds(state.pendingViewportState?.sectionBoxCurrent);
      return {
        type: "custom-float-maker-state",
        version: 2,
        savedAt: new Date().toISOString(),
        params: getParams(),
        profileUi: {
          handleOffsets: sanitizeProfileHandleOffsets(state.profileHandleOffsets)
        },
        camera: {
          position: state.camera ? state.camera.position.toArray() : [120, 90, 140],
          target: state.controls ? state.controls.target.toArray() : [0, 35, 0]
        },
        viewport: {
          materialPreset: getPreviewMaterialKey(),
          colorPreset: getPreviewColorKey(),
          transparentView: !!ui.transparentView?.checked,
          clipBoxEdit: !!ui.clipBoxEdit?.checked,
          sectionBoxCurrent: persistedSectionBoxCurrent
        }
      };
    }

    function saveBrowserStateNow() {
      try {
        localStorage.setItem(BROWSER_STORAGE_KEY, JSON.stringify(buildSavePayload()));
      } catch (err) {
        console.error(err);
      }
    }

    function scheduleBrowserStateSave() {
      if (state.autosaveTimer) {
        clearTimeout(state.autosaveTimer);
      }
      state.autosaveTimer = setTimeout(() => {
        state.autosaveTimer = null;
        saveBrowserStateNow();
      }, 150);
    }

    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function validateLoadedParams(raw) {
      if (!raw || typeof raw !== "object") {
        throw new Error("Missing params object.");
      }
      const params = {
        preset: typeof raw.preset === "string" ? raw.preset : "custom",
        profileLength: Number(raw.profileLength),
        profileThickness: raw.profileThickness !== undefined
          ? Number(raw.profileThickness)
          : FIXED_PROFILE_THICKNESS,
        p: Number(raw.p),
        q: Number(raw.q),
        alpha: Number(raw.alpha),
        beta: Number(raw.beta),
        buoyancyG: Number(raw.buoyancyG),
        wallThickness: Number(raw.wallThickness),
        bore: Number(raw.bore),
        tripodAttachZ: Number(raw.tripodAttachZ),
        tripodAttachZ2: Number(raw.tripodAttachZ2),
        tripodOffsetDeg: raw.tripodOffsetDeg !== undefined ? Number(raw.tripodOffsetDeg) : 60,
        legThickness: raw.legThickness !== undefined ? Number(raw.legThickness) : 1.6,
        baseThickness: raw.baseThickness !== undefined
          ? Number(raw.baseThickness)
          : (raw.ringHeight !== undefined ? Number(raw.ringHeight) : 1.2),
        floatBaseGap: raw.floatBaseGap !== undefined ? Number(raw.floatBaseGap) : 1.0,
        baseRadiusFactor: raw.baseRadiusFactor !== undefined ? Number(raw.baseRadiusFactor) : 0.3,
        ledD: Number(raw.ledD),
        ledLen: Number(raw.ledLen),
        drainAngleDeg: Number(raw.drainAngleDeg),
        drainHoleDiameter: Number(raw.drainHoleDiameter),
        postBaseFilletRadius: raw.postBaseFilletRadius !== undefined ? Math.abs(Number(raw.postBaseFilletRadius)) : 1,
        postTailFilletRadius: raw.postTailFilletRadius !== undefined ? Math.abs(Number(raw.postTailFilletRadius)) : 2,
        noBase: !!raw.noBase,
        invertBase: !!raw.invertBase,
        noDrain: !!raw.noDrain
      };
      if (!Number.isFinite(params.profileLength) || params.profileLength <= 0) throw new Error("Invalid profile length.");
      if (!Number.isFinite(params.profileThickness) || params.profileThickness <= 0) throw new Error("Invalid profile thickness.");
      if (!Number.isFinite(params.p) || params.p <= 0) throw new Error("Invalid p.");
      if (!Number.isFinite(params.q) || params.q <= 0) throw new Error("Invalid q.");
      if (!Number.isFinite(params.buoyancyG) || params.buoyancyG <= 0) throw new Error("Invalid buoyancy.");
      if (!Number.isFinite(params.wallThickness) || params.wallThickness <= 0) throw new Error("Invalid wall thickness.");
      if (!Number.isFinite(params.bore) || params.bore <= 0) throw new Error("Invalid bore.");
      if (!Number.isFinite(params.tripodOffsetDeg)) throw new Error("Invalid tripod offset.");
      if (!Number.isFinite(params.legThickness) || params.legThickness <= 0) throw new Error("Invalid leg thickness.");
      if (!Number.isFinite(params.baseThickness) || params.baseThickness <= 0) throw new Error("Invalid base thickness.");
      if (!Number.isFinite(params.floatBaseGap) || params.floatBaseGap < 0) throw new Error("Invalid base gap.");
      if (!Number.isFinite(params.baseRadiusFactor) || params.baseRadiusFactor <= 0) throw new Error("Invalid base radius factor.");
      if (!Number.isFinite(params.postBaseFilletRadius)) throw new Error("Invalid post base fillet.");
      if (!Number.isFinite(params.postTailFilletRadius)) throw new Error("Invalid post tail fillet.");
      return params;
    }

    function applyLoadedState(payload) {
      if (payload && (payload.profileUi !== undefined || payload.profileHandleOffsets !== undefined)) {
        state.profileHandleOffsets = sanitizeProfileHandleOffsets(
          payload.profileUi?.handleOffsets ?? payload.profileHandleOffsets
        );
      }
      const rawParams = payload && payload.params ? payload.params : payload;
      const params = validateLoadedParams(rawParams);
      setParams(params);
      if (payload && payload.camera && state.camera && state.controls) {
        const { position, target } = payload.camera;
        if (Array.isArray(position) && position.length === 3) {
          state.camera.position.fromArray(position.map(Number));
        }
        if (Array.isArray(target) && target.length === 3) {
          state.controls.target.fromArray(target.map(Number));
        }
        state.controls.update();
        state.restoreViewportOnNextRender = true;
      }
      if (payload && payload.viewport) {
        if (payload.viewport.materialPreset !== undefined && PREVIEW_MATERIALS[payload.viewport.materialPreset]) {
          ui.materialPreset.value = payload.viewport.materialPreset;
        }
        if (payload.viewport.colorPreset !== undefined && Object.prototype.hasOwnProperty.call(PREVIEW_COLORS, payload.viewport.colorPreset)) {
          ui.colorPreset.value = payload.viewport.colorPreset;
        }
        if (payload.viewport.transparentView !== undefined) {
          ui.transparentView.checked = !!payload.viewport.transparentView;
        }
        if (payload.viewport.clipBoxEdit !== undefined) {
          ui.clipBoxEdit.checked = !!payload.viewport.clipBoxEdit;
        }
        state.pendingViewportState = payload.viewport;
      }
      setSectionEditMode(!!ui.clipBoxEdit?.checked);
      applyCurrentPreviewMaterial();
    }

    function tryLoadBrowserState() {
      try {
        const raw = localStorage.getItem(BROWSER_STORAGE_KEY);
        if (!raw) {
          return false;
        }
        applyLoadedState(JSON.parse(raw));
        // Ensure cut box is restored after loading
        applyPendingViewportStateToCurrentMesh();
        return true;
      } catch (err) {
        console.error(err);
        return false;
      }
    }

    function writeAsciiStlFromMesh(mesh) {
      const geometry = mesh.geometry.index ? mesh.geometry.toNonIndexed() : mesh.geometry.clone();
      const position = geometry.getAttribute("position");
      const normalAttr = geometry.getAttribute("normal");
      const matrix = mesh.matrixWorld.clone();
      const normalMatrix = new THREE.Matrix3().getNormalMatrix(matrix);
      const a = new THREE.Vector3();
      const b = new THREE.Vector3();
      const c = new THREE.Vector3();
      const n = new THREE.Vector3();
      const lines = ["solid customfloatmaker"];

      for (let i = 0; i < position.count; i += 3) {
        a.fromBufferAttribute(position, i).applyMatrix4(matrix);
        b.fromBufferAttribute(position, i + 1).applyMatrix4(matrix);
        c.fromBufferAttribute(position, i + 2).applyMatrix4(matrix);
        if (normalAttr) {
          n.fromBufferAttribute(normalAttr, i).applyMatrix3(normalMatrix).normalize();
        } else {
          n.subVectors(c, b).cross(a.clone().sub(b)).normalize();
        }
        lines.push(
          `facet normal ${n.x} ${n.y} ${n.z}`,
          `  outer loop`,
          `    vertex ${a.x} ${a.y} ${a.z}`,
          `    vertex ${b.x} ${b.y} ${b.z}`,
          `    vertex ${c.x} ${c.y} ${c.z}`,
          `  endloop`,
          `endfacet`
        );
      }
      lines.push("endsolid customfloatmaker");
      geometry.dispose();
      return lines.join("\n");
    }

    async function exportStep() {
      if (!state.cadWorker || !state.workerReady || !state.currentMetrics) {
        setStatus("Generate a model before exporting STEP.", "warn");
        return;
      }

      try {
        const requestId = ++state.workerRequestSeq;
        const data = await new Promise((resolve, reject) => {
          state.pendingStepExports.set(requestId, { resolve, reject });
          state.cadWorker.postMessage({ type: "export-step", requestId });
        });
        const name = buildExportFilename("step");
        downloadBlob(name, new Blob([data], { type: "application/step" }));
        setStatus(`Exported ${name}`, "ok");
      } catch (err) {
        console.error(err);
        setStatus(`STEP export failed: ${err.message}`, "err");
      }
    }

    async function exportStl() {
      if (!state.cadWorker || !state.workerReady || !state.currentMetrics) {
        setStatus("Generate a model before exporting STL.", "warn");
        return;
      }
      try {
        const requestId = ++state.workerRequestSeq;
        const stl = await new Promise((resolve, reject) => {
          state.pendingStlExports.set(requestId, { resolve, reject });
          state.cadWorker.postMessage({ type: "export-stl", requestId });
        });
        const name = buildExportFilename("stl");
        downloadBlob(name, new Blob([stl], { type: "model/stl" }));
        setStatus(`Exported ${name}`, "ok");
      } catch (err) {
        console.error(err);
        setStatus(`STL export failed: ${err.message}`, "err");
      }
    }

    async function generateModel(reason = "manual") {
      if (!state.workerReady || !state.cadWorker) {
        setStatus("CAD worker is still loading.", "warn");
        return;
      }
      const buildVersion = ++state.buildVersion;
      state.fitViewOnNextBuildStage = !state.currentMesh && !state.restoreViewportOnNextRender;
      setStatus(`Generating ${reason} model...`);
      ui.generateBtn.disabled = true;
      ui.exportStepBtn.disabled = true;
      ui.exportStlBtn.disabled = true;
      try {
        const params = getParams();
        await yieldToBrowser(`Generating ${reason} model...`);
        state.currentShape = null;
        state.currentMetrics = null;
        state.cadWorker.postMessage({ type: "generate", jobId: buildVersion, params });
      } catch (err) {
        console.error(err);
        state.fitViewOnNextBuildStage = false;
        ui.generateBtn.disabled = false;
        setStatus(`CAD build failed: ${err.message}`, "err");
      }
    }

    function scheduleBuild(reason = "changed") {
      if (!state.ocReady) return;
      if (!AUTO_GENERATE_CAD) {
        markModelDirty(reason);
        return;
      }
      if (state.buildTimer) {
        clearTimeout(state.buildTimer);
      }
      state.buildTimer = setTimeout(() => {
        state.buildTimer = null;
        void generateModel(reason);
      }, 350);
    }

    [
      ui.length,
      ui.thickness,
      ui.p,
      ui.q,
      ui.alpha,
      ui.beta,
      ui.buoyancy,
      ui.wallThickness,
      ui.bore,
      ui.tripodAttachZ,
      ui.tripodAttachZ2,
      ui.tripodOffsetDeg,
      ui.legThickness,
      ui.baseThickness,
      ui.floatBaseGap,
      ui.baseRadiusFactor,
      ui.ledD,
      ui.ledLen,
      ui.drainAngle,
      ui.drainDiameter,
      ui.postBaseFillet,
      ui.postTailFillet
    ].forEach((el) => {
      el.addEventListener("input", () => {
        if (el === ui.buoyancy) {
          setInputNumericValue(ui.buoyancy, Number(ui.buoyancy.value));
        }
        ui.preset.value = "custom";
        updateLabels();
        drawProfile();
        scheduleBrowserStateSave();
        scheduleBuild("slider");
      });
    });

    [ui.noBase, ui.invertBase, ui.noDrain].forEach((el) => {
      el.addEventListener("change", () => {
        drawProfile();
        scheduleBrowserStateSave();
        scheduleBuild("toggle");
      });
    });

    ui.preset.addEventListener("change", () => {
      applyPreset(ui.preset.value);
      scheduleBrowserStateSave();
      scheduleBuild("preset");
    });

    ui.generateBtn.addEventListener("click", () => { void generateModel("manual"); });
    ui.exportStepBtn.addEventListener("click", exportStep);
    ui.exportStlBtn.addEventListener("click", exportStl);
    ui.fitBtn.addEventListener("click", () => {
      fitCameraToCurrentMesh();
      scheduleBrowserStateSave();
    });
    ui.clipBoxEdit.addEventListener("change", () => {
      setSectionEditMode(ui.clipBoxEdit.checked);
      scheduleBrowserStateSave();
    });
    ui.materialPreset.addEventListener("change", () => {
      applyCurrentPreviewMaterial();
      scheduleBrowserStateSave();
    });
    ui.colorPreset.addEventListener("change", () => {
      applyCurrentPreviewMaterial();
      scheduleBrowserStateSave();
    });
    ui.transparentView.addEventListener("change", () => {
      applyMeshTransparency();
      scheduleBrowserStateSave();
    });

    ui.saveBtn.addEventListener("click", () => {
      const payload = buildSavePayload();
      const fileName = buildExportFilename("json");
      downloadBlob(fileName, new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" }));
      setStatus(`Saved ${fileName}`, "ok");
    });

    ui.loadBtn.addEventListener("click", () => ui.loadInput.click());
    ui.loadInput.addEventListener("change", async () => {
      const [file] = ui.loadInput.files || [];
      if (!file) return;
      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        applyLoadedState(payload);
        saveBrowserStateNow();
        scheduleBuild("loaded");
        setStatus(`Loaded ${file.name}. Click Generate CAD.`, "ok");
      } catch (err) {
        console.error(err);
        setStatus(`Load failed: ${err.message}`, "err");
      } finally {
        ui.loadInput.value = "";
      }
    });

    window.addEventListener("resize", drawProfile);
    profileCanvas.style.touchAction = "none";
    profileCanvas.addEventListener("pointerdown", onProfilePointerDown);
    profileCanvas.addEventListener("pointermove", onProfilePointerMove);
    profileCanvas.addEventListener("pointerup", onProfilePointerUp);
    profileCanvas.addEventListener("pointercancel", onProfilePointerCancel);
    profileCanvas.addEventListener("contextmenu", onProfileContextMenu);
    profileCanvas.addEventListener("pointerleave", (event) => {
      if (!state.profileFilletDrag) {
        updateProfileCursor(getProfileCanvasPoint(event));
      }
    });
    if (typeof ResizeObserver !== "undefined") {
      const profileResizeObserver = new ResizeObserver(() => {
        drawProfile();
      });
      profileResizeObserver.observe(profileCanvas);
      if (profileCanvas.parentElement) {
        profileResizeObserver.observe(profileCanvas.parentElement);
      }
    }

    setupViewport();
    if (!tryLoadBrowserState()) {
      updateLabels();
      applyPreset("custom");
      drawProfile();
      saveBrowserStateNow();
    }

    try {
      setStatus("Loading CAD worker...");
      initCadWorker();
    } catch (err) {
      console.error(err);
      setStatus(
        `CAD worker failed to load: ${err.message}\nUse serve_customfloatmaker.py and open the localhost URL.`,
        "err"
      );
    }
  </script>
</body>
</html>
